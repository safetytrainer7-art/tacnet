<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TACNET Landing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  html, body {
    margin: 0; 
    padding: 0;
    height: 100vh;
    font-family: 'Bebas Neue', cursive, sans-serif;
    background: url('IMAGE FOR TAC.png') no-repeat center center fixed;
    background-size: contain;
    overflow: hidden;
    position: relative;
  }

  /* Neon red border */
  body::before {
    content: '';
    position: fixed;
    top: 10px; bottom: 10px;
    left: 10px; right: 10px;
    pointer-events: none;
    border: 3px solid #FF3131;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131,
      inset 0 0 15px #FF3131;
    border-radius: 6px;
    z-index: 9999;
  }

  /* Arrow button flush bottom right, no margin */
  .arrow-btn {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 60px;
    height: 60px;
    cursor: pointer;
    background: rgba(9, 26, 70, 0.85);
    border: 3px solid #FF3131;
    border-radius: 10px 0 0 0;
    box-shadow:
      0 0 15px #FF3131,
      0 0 30px #FF3131;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.3s;
    z-index: 10000;
  }

  .arrow-btn:hover {
    background: rgba(12, 38, 105, 1);
  }

  .arrow-icon {
    border: solid #e4c963;
    border-width: 0 4px 4px 0;
    display: inline-block;
    padding: 12px;
    transform: rotate(45deg); /* arrow pointing down-right */
    -webkit-transform: rotate(45deg);
  }
</style>
</head>
<body>

  <button class="arrow-btn" aria-label="Proceed" onclick="location.href='signin.html'">
    <i class="arrow-icon"></i>
  </button>

</body>
</html>
