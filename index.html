<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TACNET - Landing Page</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  html, body {
    margin: 0; padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Bebas Neue', cursive, sans-serif;
    background: #000000 url('IMAGE FOR TAC.png') no-repeat center center fixed;
    background-size: contain;
    -webkit-background-size: contain;
    -moz-background-size: contain;
    -o-background-size: contain;
    position: relative;
  }

  /* Red neon border perimeter */
  body::before {
    content: '';
    position: fixed;
    top: 10px; bottom: 10px;
    left: 10px; right: 10px;
    pointer-events: none;
    border: 3px solid #FF3131;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131,
      inset 0 0 15px #FF3131;
    border-radius: 6px;
    z-index: 9999;
  }

  /* Smaller repositioned buttons bottom center */
  .btn-container {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1rem;
  }

  .btn {
    padding: 0.6rem 1.5rem;
    font-size: 1rem;
    color: #e4c963;
    background: rgba(9, 26, 70, 0.75);
    border: 2px solid #FF3131;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow:
      0 0 8px #002366,
      0 0 15px #0044cc;
    transition: all 0.3s ease;
    user-select: none;
  }

  .btn:hover,
  .btn:focus {
    background: rgba(12, 38, 105, 1);
    box-shadow:
      0 0 15px #ff3a3a,
      0 0 25px #ff5151;
    color: #fff4a3;
    outline: none;
  }

  @media (max-width: 600px) {
    .btn {
      font-size: 0.85rem;
      padding: 0.5rem 1.2rem;
    }
    .btn-container {
      bottom: 6%;
    }
  }
</style>
</head>
<body>

  <div class="btn-container">
    <button class="btn" type="button" aria-label="Start Search">Start Search</button>
    <button class="btn" type="button" aria-label="Access Token Login">Access Token Login</button>
  </div>

</body>
</html>
