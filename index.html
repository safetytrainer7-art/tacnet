<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET // CENTRAL COMMAND</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020803;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Screen Management */
        .app-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        .screen-active {
            display: flex !important;
        }

        /* --- STAGE 1: CUSTOM HOMEPAGE --- */
        #homepage-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #010401;
            cursor: pointer;
        }

        .hero-image {
            max-width: 90%;
            max-height: 70vh;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            object-fit: contain;
        }

        .homepage-footer {
            margin-top: 25px;
            color: #D4AF37;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- STAGE 2: TACTICAL SIGN-IN ROSTER --- */
        #signin-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #051609 0%, #010401 100%);
            border: 4px solid #0B2510;
        }

        .roster-card {
            width: 340px;
            max-width: 85%;
            border: 1px solid #D4AF37;
            background-color: rgba(11, 37, 16, 0.85);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .roster-header {
            text-align: center;
            color: #D4AF37;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(214, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .roster-input {
            background-color: #020803;
            border: 1px solid rgba(214, 175, 55, 0.5);
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .roster-input:focus {
            outline: none;
            border-color: #00FF00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }

        select.roster-input {
            color: #ffffff;
            cursor: pointer;
        }

        select.roster-input option {
            background-color: #0B2510;
            color: #ffffff;
        }

        .auth-btn {
            width: 100%;
            background-color: #020803;
            color: #D4AF37;
            border: 1.5px solid #D4AF37;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 2px;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            background-color: #D4AF37;
            color: #020803;
            box-shadow: 0 0 15px #D4AF37;
        }

        /* --- STAGE 3: HUNTER GREEN TACTICAL COMMAND SCREEN --- */
        #tactical-screen {
            flex-direction: column;
        }

        #nvg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 255, 0, 0.12);
            pointer-events: none;
            display: none;
            z-index: 999;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-arrow {
            background-color: rgba(2, 8, 3, 0.85);
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 4px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .roster-banner {
            background-color: #0B2510;
            color: #D4AF37;
            padding: 8px 14px;
            border: 1px solid #D4AF37;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background-color: rgba(2, 8, 3, 0.85);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.24);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            font-family: inherit;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-active {
            background-color: rgba(0, 255, 0, 0.2) !important;
            border-color: #00FF00 !important;
            color: #00FF00 !important;
        }

        /* INTERACTIVE GPS MAP VIEWPORT */
        #map-viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* NEW: ADDRESS SEARCH BAR HUD CONTAINER */
        .search-address-hud {
            position: absolute;
            top: 80px;
            left: 15px;
            right: 15px;
            display: flex;
            gap: 6px;
            z-index: 1000;
        }

        .address-input {
            flex: 1;
            background-color: rgba(2, 8, 3, 0.85);
            border: 1px solid #D4AF37;
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .address-input:focus {
            outline: none;
            border-color: #00FF00;
        }

        .go-btn {
            background-color: #0B2510;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 0 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* Lower Tactical HUD Ribbon */
        .lower-hud-ribbon {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(2, 8, 3, 0.85);
            border: 1px solid #0B2510;
            border-left: 4px solid #D4AF37;
            padding: 10px 20px;
            border-radius: 4px;
            z-index: 1000;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #status-text {
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }

        #sub-status {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .search-trigger {
            position: absolute;
            bottom: 25px;
            right: 15px;
            background-color: rgba(11, 37, 16, 0.9);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            width: 48px;
            height: 48px;
            border-radius: 4px;
            display: none; 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- STAGE 4: FULL-SCREEN TACTICAL REGISTRY --- */
        #search-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #051207;
            padding: 30px 20px 20px 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            z-index: 2000;
            border: 4px solid #0B2510;
        }

        .search-header-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .search-nav-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-main-title {
            color: #D4AF37;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .purge-btn {
            background-color: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .purge-btn:hover {
            background-color: #ff5252;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.4);
        }

        .registry-title {
            color: rgba(255, 255, 255, 0.38);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .divider {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            margin-bottom: 15px;
        }

        #roster-results-container {
            flex: 1;
            overflow-y: auto;
        }

        .result-item {
            background-color: rgba(11, 37, 16, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .unit-name {
            font-weight: bold;
            margin-bottom: 4px;
            color: #ffffff;
        }

        .unit-status {
            color: rgba(255, 255, 255, 0.54);
            font-size: 13px;
        }

        .unit-time {
            color: #D4AF37;
            font-size: 12px;
        }
        
        .loading-text {
            color: rgba(255, 255, 255, 0.38);
            text-align: center;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="homepage-screen" class="app-screen screen-active" onclick="navigateToSignIn()">
        <img src="IMAGE FOR TAC.png2.jpg" alt="TACNET SYSTEM DESIGN" class="hero-image" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block';">
        <div id="alt-title" style="display:none; color:#D4AF37; font-size:28px; font-weight:bold; letter-spacing:4px; text-align:center;">TACNET DATABASE</div>
        <div class="homepage-footer">CLICK ANYWHERE TO ENTER NETWORK</div>
    </div>

    <div id="signin-screen" class="app-screen">
        <div class="roster-card">
            <div class="roster-header">MULTI-AGENCY ROSTER</div>
            
            <div class="form-group">
                <label>AGENCY / DEPARTMENT</label>
                <input type="text" id="input-agency" class="roster-input" placeholder="e.g., SHERIFF'S OFFICE" value="AMHERST CO SO">
            </div>

            <div class="form-group">
                <label>OFFICER FULL NAME</label>
                <input type="text" id="input-name" class="roster-input" placeholder="e.g., DEPUTY J. DOE">
            </div>

            <div class="form-group">
                <label>UNIT CALL SIGN (ID)</label>
                <input type="text" id="input-callsign" class="roster-input" placeholder="e.g., K9-1, CAR-4" style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label>ACTIVE DUTY ASSIGNMENT</label>
                <select id="input-assignment" class="roster-input">
                    <option value="TRACKING">TRACKING TEAM / K9</option>
                    <option value="PERIMETER">PERIMETER POST</option>
                    <option value="COMMAND">COMMAND STRUCTURE</option>
                </select>
            </div>

            <button class="auth-btn" onclick="authorizeRoster()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <div id="tactical-screen" class="app-screen">
        <div id="nvg-overlay"></div>

        <div class="hud-header">
            <div class="hud-left">
                <button class="back-arrow" onclick="navigateToGate()">←</button>
                <div id="hud-display-banner" class="roster-banner">OFFLINE // STANDBY</div>
            </div>
            <div class="controls">
                <button id="link-btn" class="btn" onclick="toggleLink()">LINK OFFLINE</button>
                <button id="nvg-btn" class="btn" onclick="toggleNvg()">NVG</button>
            </div>
        </div>

        <div class="search-address-hud">
            <input type="text" id="address-field" class="address-input" placeholder="Enter Target Address or Landmark (e.g. Lynchburg, VA)...">
            <button class="go-btn" onclick="searchTargetAddress()">GO</button>
        </div>

        <div id="map-viewport"></div>

        <div class="lower-hud-ribbon">
            <div id="status-text">CONFERENCE TABLE DEPLOYMENT // STANDBY</div>
            <div id="sub-status">TAP MAP TO MANUALLY POSITION SEARCHERS</div>
        </div>

        <div id="live-search-icon" class="search-trigger" onclick="openSearch()">🔍</div>

        <div id="search-panel">
            <div class="search-header-layout">
                <div class="search-nav-group">
                    <button class="back-arrow" onclick="closeSearch()">←</button>
                    <span class="search-main-title">TACTICAL ROSTER PANEL</span>
                </div>
                <button class="purge-btn" onclick="purgeServerRoster()">PURGE ACTIVE ROSTER</button>
            </div>
            
            <div class="registry-title">LIVE ACTIVE ASSETS IN DATABASE MAP LEDGER</div>
            <hr class="divider">
            <div id="roster-results-container"></div>
        </div>
    </div>

    <script>
        const { Client, Databases, ID } = Appwrite;
        const client = new Client()
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('6a38e834003e0cc64c31'); 

        const databases = new Databases(client);

        let linkActive = false;
        let nvgActive = false;
        
        let tacticalMap = null;
        let currentMarker = null;

        let sessionData = {
            agency: '',
            name: '',
            callsign: '',
            assignment: ''
        };

        function navigateToSignIn() {
            document.getElementById('homepage-screen').classList.remove('screen-active');
            document.getElementById('signin-screen').classList.add('screen-active');
        }

        function authorizeRoster() {
            const callsignInput = document.getElementById('input-callsign').value.toUpperCase().trim();
            const nameInput = document.getElementById('input-name').value.trim();
            const agencyInput = document.getElementById('input-agency').value.trim();
            const assignmentInput = document.getElementById('input-assignment').value;

            if (!callsignInput || !nameInput) {
                alert("ROSTER ERROR: Officer Name and Unit Call Sign are required fields.");
                return;
            }

            sessionData.agency = agencyInput || "UNKNOWN DEPT";
            sessionData.name = nameInput;
            sessionData.callsign = callsignInput;
            sessionData.assignment = assignmentInput;

            document.getElementById('hud-display-banner').innerText = `${sessionData.callsign} // STATUS: ${sessionData.assignment}`;

            document.getElementById('signin-screen').classList.remove('screen-active');
            document.getElementById('tactical-screen').classList.add('screen-active');

            initializeTacticalMap();
        }

        function initializeTacticalMap() {
            if (tacticalMap !== null) return;

            tacticalMap = L.map('map-viewport', { zoomControl: false }).setView([37.525, -79.124], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(tacticalMap);

            // RESTORED: Tap anywhere on the table map to manually place searchers for demo purposes!
            tacticalMap.on('click', handleMapManualPlacement);
        }

        // FREE ADDRESS SEARCH ENGINE (Uses OpenStreetMap's Free Nominatim API Tool)
        async function searchTargetAddress() {
            const query = document.getElementById('address-field').value.trim();
            if (!query) return;

            document.getElementById('status-text').innerText = "SEARCHING SATELLITE CHANNELS...";

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);

                    // Smoothly fly the map directly to that location on your iPad screen!
                    tacticalMap.flyTo([lat, lon], 14);
                    document.getElementById('status-text').innerText = "TARGET LOCATED // VIEWPORT SECURED";
                } else {
                    document.getElementById('status-text').innerText = "ADDRESS NOT FOUND // VERIFY CORRIDOR";
                }
            } catch (error) {
                document.getElementById('status-text').innerText = "NETWORK TIMEOUT ENGAGING SATELLITE ENGINE";
            }
        }

        // Handles manual map taps at the table presentation
        function handleMapManualPlacement(e) {
            if (!linkActive) {
                alert("TACTICAL ALERT: Turn your RADIO LINK ONLINE to begin tracking assets on the map.");
                return;
            }

            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            const coordsString = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;

            document.getElementById('sub-status').innerText = `MANUAL PIN ENGAGED // COORDS: ${coordsString}`;

            if (currentMarker) tacticalMap.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lng]).addTo(tacticalMap)
                .bindPopup(`<b>${sessionData.callsign}</b><br>${sessionData.name}<br>${sessionData.agency}`)
                .openPopup();

            // Fire coordinates straight to your Appwrite ledger list rows instantly!
            transmitPacket(coordsString);
        }

        function navigateToGate() {
            if (linkActive) toggleLink();
            document.getElementById('tactical-screen').classList.remove('screen-active');
            document.getElementById('homepage-screen').classList.add('screen-active');
        }

        function toggleLink() {
            linkActive = !linkActive;
            const btn = document.getElementById('link-btn');
            const status = document.getElementById('status-text');
            const sub = document.getElementById('sub-status');
            const searchIcon = document.getElementById('live-search-icon');

            if (linkActive) {
                btn.innerText = "LINK ONLINE";
                btn.classList.add('btn-active');
                status.innerText = "RADIO LINK ACTIVE // FIELD TRANSPORTS STANDBY";
                sub.innerText = "TAP MAP TO ASSIGN FIELD PLACEMENT";
                sub.style.color = "#00FF00";
                searchIcon.style.display = 'flex';
            } else {
                btn.innerText = "LINK OFFLINE";
                btn.classList.remove('btn-active');
                status.innerText = "CONFERENCE TABLE DEPLOYMENT // STANDBY";
                sub.innerText = "TAP MAP TO MANUALLY POSITION SEARCHERS";
                sub.style.color = "rgba(255, 255, 255, 0.5)";
                searchIcon.style.display = 'none';

                if (currentMarker) {
                    tacticalMap.removeLayer(currentMarker);
                    currentMarker = null;
                }
            }
        }

        async function transmitPacket(coordinates) {
            try {
                const comprehensiveCallsign = `${sessionData.callsign} (${sessionData.name}) [${sessionData.agency}]`;

                await databases.createDocument(
                    'tacnet-search-app', 
                    'tacnet_live_units', 
                    ID.unique(),
                    {
                        'tacnet_live_units': comprehensiveCallsign,
                        'location': coordinates,
                        'operationalStatus': `ASSIGNMENT: ${sessionData.assignment}`,
                        'lastUpdateTime': new Date().toLocaleTimeString().substring(0, 5)
                    }
                );
            } catch (error) {
                console.log("Appwrite sync failed.");
            }
        }

        async function openSearch() {
            const container = document.getElementById('roster-results-container');
            document.getElementById('search-panel').style.display = 'flex';
            container.innerHTML = '<div class="loading-text">POLLING SECURE BACKEND SATELLITE NETWORK...</div>';

            try {
                const response = await databases.listDocuments('tacnet-search-app', 'tacnet_live_units');
                container.innerHTML = '';

                if (response.documents.length === 0) {
                    container.innerHTML = '<div class="loading-text">NO ACTIVE TRANSMISSIONS FOUND IN LEDGER</div>';
                    return;
                }

                response.documents.forEach(doc => {
                    const itemHtml = `
                        <div class="result-item">
                            <div>
                                <div class="unit-name">${doc.tacnet_live_units || 'UNKNOWN UNIT'}</div>
                                <div class="unit-status">${doc.operationalStatus || 'STATUS PENDING'} // LOC: ${doc.location || '0.0, 0.0'}</div>
                            </div>
                            <div class="unit-time">${doc.lastUpdateTime || '--:--'}</div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', itemHtml);
                });
            } catch (error) {
                container.innerHTML = '<div class="loading-text" style="color: #ff5252;">ROSTER FETCH FAILURE // ACCESS DENIED</div>';
            }
        }

        function closeSearch() {
            document.getElementById('search-panel').style.display = 'none';
        }

        async function purgeServerRoster() {
            const verification = confirm("WARNING: You are about to clear ALL active tracking units from the server ledger. Proceed?");
            if (!verification) return;

            const container = document.getElementById('roster-results-container');
            container.innerHTML = '<div class="loading-text" style="color: #ff5252;">WIPING SERVER ROSTER LEDGER...</div>';

            try {
                const response = await databases.listDocuments('tacnet-search-app', 'tacnet_live_units');
                for (let doc of response.documents) {
                    await databases.deleteDocument('tacnet-search-app', 'tacnet_live_units', doc.$id);
                }
                openSearch();
            } catch (error) {
                alert("DATABASE WIPE SYSTEM FAILURE: Check operational admin credentials.");
                openSearch();
            }
        }

        function toggleNvg() {
            nvgActive = !nvgActive;
            const btn = document.getElementById('nvg-btn');
            const overlay = document.getElementById('nvg-overlay');

            if (nvgActive) {
                btn.classList.add('btn-active');
                overlay.style.display = 'block';
            } else {
                btn.classList.remove('btn-active');
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
