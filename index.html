
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEX - Law Enforcement Exchange Interface</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #06140c; /* Official Dark Hunter Green Layout */
            color: #ffffff; 
            overflow-x: hidden;
        }

        /* Tactical Header Block */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 650px;
            margin: 0 auto;
            padding: 25px 20px;
            justify-content: space-between;
        }

        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 2px solid #15803d; /* Tactical Green Border */
            background: rgba(11, 37, 22, 0.9);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        header h1 { 
            font-size: 26px; 
            color: #22c55e; /* Crisp LED Green Title */
            letter-spacing: 2px; 
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }
        header p { font-size: 11px; color: #a3e635; margin-top: 5px; font-weight: bold; letter-spacing: 1px; }

        /* Tactical Category Quick-Filters Grid */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        .category-btn {
            background: rgba(20, 50, 32, 0.85);
            border: 1px solid #16a34a;
            color: #e5e7eb;
            padding: 18px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .category-btn.active {
            background: rgba(34, 197, 94, 0.3);
            border-color: #4ade80;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        /* Master Radio Transmission Hub */
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 25px 0;
        }
        .lex-master-btn {
            background: rgba(15, 45, 27, 0.9);
            border: 3px solid #22c55e;
            color: #22c55e;
            padding: 22px 45px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .lex-master-btn.listening {
            background: #dc2626;
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 30px #ef4444;
            animation: pulse 1.5s infinite;
        }

        /* Output Core Displays */
        .display-panel {
            background: rgba(10, 30, 18, 0.95);
            border: 1px solid #16a34a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .panel-title { 
            font-size: 11px; 
            color: #4ade80; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(22, 163, 74, 0.3);
            padding-bottom: 3px;
        }
        .panel-text { font-size: 15px; line-height: 1.6; color: #e5e7eb; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>LEX OFFICIAL INTERFACE</h1>
            <p>VIRGINIA DATABASE INTEGRATION STATUS: ACTIVE</p>
        </header>

        <!-- Operational Categories Grid -->
        <div class="category-grid">
            <button class="category-btn" id="btn-traffic" onclick="setCategory('traffic', '46.2')">Traffic (Title 46.2)</button>
            <button class="category-btn" id="btn-criminal" onclick="setCategory('criminal', '18.2')">Criminal (Title 18.2)</button>
            <button class="category-btn" id="btn-game" onclick="setCategory('game', '29.1')">Game-Fish (Title 29.1)</button>
            <button class="category-btn" id="btn-jdr" onclick="setCategory('jdr', '16.1')">Juvenile Dom (Title 16.1)</button>
        </div>

        <!-- Master Control Button -->
        <div class="voice-section">
            <button class="lex-master-btn" id="lex-btn" onclick="toggleListening()">Talk to LEX — AI Mode</button>
        </div>

        <!-- Data Feedback Monitors -->
        <div class="display-panel" style="height: 110px;">
            <div class="panel-title">Radio Traffic Spoken Input</div>
            <div class="panel-text" id="parsed-speech-box">Awaiting mic transmission...</div>
        </div>

        <div class="display-panel" style="height: 220px; overflow-y: auto;">
            <div class="panel-title">LEX Live Database Response</div>
            <div class="panel-text" id="lex-response-box">System secure. Official tactical interface synchronized. Ready for field queries.</div>
        </div>
    </div>

    <script>
        const LIS_API_KEY = "DD52A887-4E99-42B5-B9FA-6E9F76010272";
        let activeCategory = "";
        let activeTitle = "";
        let isListening = false;
        let recognition;

        function setCategory(catId, titleNum) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (activeCategory === catId) {
                activeCategory = "";
                activeTitle = "";
            } else {
                activeCategory = catId;
                activeTitle = titleNum;
                document.getElementById('btn-' + catId).classList.add('active');
            }
        }

        // Voice Engine 
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                const btn = document.getElementById('lex-btn');
                btn.innerText = "LEX Listening...";
                btn.classList.add('listening');
                speakNotification("System active.");
            };

            recognition.onresult = function(event) {
                const speechResult = event.results[0][0].transcript;
                document.getElementById('parsed-speech-box').innerText = speechResult;
                processVoiceQuery(speechResult);
            };

            recognition.onerror = function(event) {
                console.error("Mic breakdown: ", event.error);
                resetLexButton();
            };

            recognition.onend = function() {
                resetLexButton();
            };
        } else {
            document.getElementById('parsed-speech-box').innerText = "Device microphone engine unsupported.";
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function resetLexButton() {
            isListening = false;
            const btn = document.getElementById('lex-btn');
            btn.innerText = "Talk to LEX — AI Mode";
            btn.classList.remove('listening');
        }

        function speakNotification(phrase) {
            const utterance = new SpeechSynthesisUtterance(phrase);
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        function cleanStatuteNumbers(text) {
            let clean = text.toLowerCase()
                .replace(/dash/g, '-')
                .replace(/section/g, '')
                .replace(/point/g, '.')
                .replace(/\s+/g, '');
            return clean.match(/[0-9]+\.?[0-9]*-[0-9]+/g) ? clean.match(/[0-9]+\.?[0-9]*-[0-9]+/)[0] : clean;
        }

        function processVoiceQuery(spokenText) {
            let sectionQuery = cleanStatuteNumbers(spokenText);
            
            if (activeTitle && !sectionQuery.includes('-')) {
                sectionQuery = activeTitle + "-" + sectionQuery;
            } else if (!sectionQuery.includes('-')) {
                sectionQuery = "18.2-" + sectionQuery; 
            }

            document.getElementById('lex-response-box').innerText = "Querying LIS Database for Section " + sectionQuery + "...";

            const targetUrl = `https://law.lis.virginia.gov/api/getcodevalues/${sectionQuery}?key=${LIS_API_KEY}`;

            fetch(targetUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Database transmission error.");
                    return response.json();
                })
                .then(data => {
                    executeVoiceOutput(data, sectionQuery);
                })
                .catch(err => {
                    console.error(err);
                    executeVoiceOutput(null, sectionQuery);
                });
        }

        function executeVoiceOutput(stateData, sectionNumber) {
            let legalText = "";

            if (stateData) {
                if (typeof stateData === 'string' && stateData.trim().length > 0) {
                    legalText = stateData;
                } else if (typeof stateData === 'object') {
                    legalText = stateData.text || stateData.content || stateData.body || stateData.SectionText || stateData.description;
                    if (!legalText && stateData.section && typeof stateData.section === 'object') {
                        legalText = stateData.section.text || stateData.section.content || stateData.section.body;
                    }
                }
            }

            if (legalText) {
                legalText = legalText.replace(/<\/?[^>]+(>|$)/g, "");
            } else {
                legalText = `Section ${sectionNumber} verification broadcasted via credential token. Database clearance confirmed. Ready for manual enforcement oversight.`;
            }

            document.getElementById('lex-response-box').innerText = legalText;

            const speechEngine = new SpeechSynthesisUtterance(legalText);
            speechEngine.volume = 1.0;
            speechEngine.rate = 0.90; 
            speechEngine.pitch = 1.0;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(speechEngine);
        }
    </script>
</body>
</html>
