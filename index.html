
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET // MASTER CENTRAL COMMAND</title>
    <!-- Include the Official Appwrite Web SDK Platform -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    
    <!-- LEAFLET GPS MAP ENGINE STYLES & SCRIPTS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020803;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Screen Management */
        .app-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        .screen-active {
            display: flex !important;
        }

        /* --- STAGE 1: CUSTOM HOMEPAGE --- */
        #homepage-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #010401;
            cursor: pointer;
        }

        .hero-image {
            max-width: 90%;
            max-height: 70vh;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            object-fit: contain;
        }

        .homepage-footer {
            margin-top: 25px;
            color: #D4AF37;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- STAGE 2: TACTICAL SIGN-IN ROSTER --- */
        #signin-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #051609 0%, #010401 100%);
            border: 4px solid #0B2510;
        }

        .roster-card {
            width: 340px;
            max-width: 85%;
            border: 1px solid #D4AF37;
            background-color: rgba(11, 37, 16, 0.9);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .roster-header {
            text-align: center;
            color: #D4AF37;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(214, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .roster-input {
            background-color: #020803;
            border: 1px solid rgba(214, 175, 55, 0.5);
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .roster-input:focus {
            outline: none;
            border-color: #00FF00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }

        select.roster-input {
            color: #ffffff;
            cursor: pointer;
        }

        .auth-btn {
            width: 100%;
            background-color: #020803;
            color: #D4AF37;
            border: 1.5px solid #D4AF37;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        .auth-btn:hover {
            background-color: #D4AF37;
            color: #020803;
            box-shadow: 0 0 15px #D4AF37;
        }

        /* --- STAGE 3: HUNTER GREEN COMMAND SCREEN --- */
        #tactical-screen {
            flex-direction: column;
        }

        #nvg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 255, 0, 0.15);
            pointer-events: none;
            display: none;
            z-index: 999;
        }

        .hud-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-arrow {
            background-color: rgba(2, 8, 3, 0.85);
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 4px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .roster-banner {
            background-color: #0B2510;
            color: #D4AF37;
            padding: 8px 14px;
            border: 1px solid #D4AF37;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background-color: rgba(2, 8, 3, 0.85);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.24);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            font-family: inherit;
        }

        .btn-active {
            background-color: rgba(0, 255, 0, 0.2) !important;
            border-color: #00FF00 !important;
            color: #00FF00 !important;
        }

        /* LIVE MAP STYLES */
        #map-viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ADDRESS HUD OVERLAY */
        .search-address-hud {
            position: absolute;
            top: 75px;
            left: 15px;
            right: 15px;
            display: flex;
            gap: 6px;
            z-index: 1000;
        }

        .address-input {
            flex: 1;
            background-color: rgba(2, 8, 3, 0.9);
            border: 1px solid #D4AF37;
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
        }

        .go-btn {
            background-color: #0B2510;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 0 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
        }

        .lower-hud-ribbon {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(2, 8, 3, 0.9);
            border: 1px solid #0B2510;
            border-left: 4px solid #D4AF37;
            padding: 10px 20px;
            border-radius: 4px;
            z-index: 1000;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #status-text {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }

        #sub-status {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .search-trigger {
            position: absolute;
            bottom: 25px;
            right: 15px;
            background-color: rgba(11, 37, 16, 0.9);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            width: 48px;
            height: 48px;
            border-radius: 4px;
            display: flex; 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
        }

        /* Custom Colored Dots Styles for Map Elements */
        .tactical-dot-tracking { background-color: #ff5252; border: 2px solid white; border-radius: 50%; width: 12px; height: 12px; display: block; box-shadow: 0 0 8px #ff5252; }
        .tactical-dot-perimeter { background-color: #3897f0; border: 2px solid white; border-radius: 50%; width: 12px; height: 12px; display: block; box-shadow: 0 0 8px #3897f0; }
        .tactical-dot-command { background-color: #00ff00; border: 2px solid white; border-radius: 50%; width: 12px; height: 12px; display: block; box-shadow: 0 0 8px #00ff00; }

        /* --- STAGE 4: FULL-SCREEN TACTICAL REGISTRY --- */
        #search-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #051207;
            padding: 30px 20px 20px 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            z-index: 2000;
            border: 4px solid #0B2510;
        }

        .search-header-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .search-nav-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-main-title {
            color: #D4AF37;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .purge-btn {
            background-color: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .registry-title {
            color: rgba(255, 255, 255, 0.38);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .divider {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            margin-bottom: 15px;
        }

        #roster-results-container {
            flex: 1;
            overflow-y: auto;
        }

        .result-item {
            background-color: rgba(11, 37, 16, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .unit-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .unit-status {
            color: rgba(255, 255, 255, 0.54);
            font-size: 13px;
        }

        .unit-time {
            color: #D4AF37;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- STAGE 1: HOMEPAGE -->
    <div id="homepage-screen" class="app-screen screen-active" onclick="navigateToSignIn()">
        <img src="IMAGE FOR TAC.png2.jpg" alt="TACNET SYSTEM DESIGN" class="hero-image" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block';">
        <div id="alt-title" style="display:none; color:#D4AF37; font-size:28px; font-weight:bold; letter-spacing:4px;">TACNET DATABASE</div>
        <div class="homepage-footer">CLICK ANYWHERE TO ENTER NETWORK</div>
    </div>

    <!-- STAGE 2: SIGN-IN ROSTER -->
    <div id="signin-screen" class="app-screen">
        <div class="roster-card">
            <div class="roster-header">MULTI-AGENCY ROSTER</div>
            <div class="form-group">
                <label>AGENCY / DEPARTMENT</label>
                <input type="text" id="input-agency" class="roster-input" value="AMHERST CO SO">
            </div>
            <div class="form-group">
                <label>OFFICER FULL NAME</label>
                <input type="text" id="input-name" class="roster-input" placeholder="e.g., DEPUTY JONES">
            </div>
            <div class="form-group">
                <label>UNIT CALL SIGN (ID)</label>
                <input type="text" id="input-callsign" class="roster-input" placeholder="e.g., K9-1" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>ACTIVE DUTY ASSIGNMENT</label>
                <select id="input-assignment" class="roster-input">
                    <option value="TRACKING">TRACKING TEAM / K9 (RED)</option>
                    <option value="PERIMETER">PERIMETER POST (BLUE)</option>
                    <option value="COMMAND">COMMAND STRUCTURE (GREEN)</option>
                </select>
            </div>
            <button class="auth-btn" onclick="authorizeRoster()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <!-- STAGE 3: LIVE COMMAND DECK WITH SATELLITE MAP -->
    <div id="tactical-screen" class="app-screen">
        <div id="nvg-overlay"></div>

        <div class="hud-header">
            <div class="hud-left">
                <button class="back-arrow" onclick="navigateToGate()">←</button>
                <div id="hud-display-banner" class="roster-banner">OFFLINE // STANDBY</div>
            </div>
            <div class="controls">
                <button id="link-btn" class="btn" onclick="toggleLink()">LINK OFFLINE</button>
                <button id="nvg-btn" class="btn" onclick="toggleNvg()">NVG</button>
            </div>
        </div>

        <!-- ADDRESS SEARCH BAR HUD -->
        <div class="search-address-hud">
            <input type="text" id="address-field" class="address-input" placeholder="Enter Target Address (e.g. Amelon Rd, Madison Heights VA)...">
            <button class="go-btn" onclick="searchTargetAddress()">GO</button>
        </div>

        <!-- LIVE SATELLITE IMAGERY VIEWPORT -->
        <div id="map-viewport"></div>

        <div class="lower-hud-ribbon">
            <div id="status-text" style="color: #ff5252;">SYSTEM READY // RADIO STANDBY</div>
            <div id="sub-status">MAP IS INTERACTIVE // TAP PLACES SIMULATED SEARCHERS</div>
        </div>

        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <!-- STAGE 4: REGISTRY LEDGER -->
    <div id="search-panel">
        <div class="search-header-layout">
            <div class="search-nav-group">
                <button class="back-arrow" onclick="closeSearch()">←</button>
                <span class="search-main-title">TACTICAL ROSTER PANEL</span>
            </div>
            <button class="purge-btn" onclick="purgeServerRoster()">PURGE ACTIVE ROSTER</button>
        </div>
        <div class="registry-title">LIVE ACTIVE ASSETS IN DATABASE MAP LEDGER</div>
        <hr class="divider">
        <div id="roster-results-container"></div>
    </div>

    <script>
        const { Client, Databases, ID } = Appwrite;
        const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('6a38e834003e0cc64c31'); 
        const databases = new Databases(client);

        let linkActive = false;
        let nvgActive = false;
        let watchId = null;
        
        let tacticalMap = null;
        let myMarker = null;
        let databaseMarkers = [];

        let sessionData = { agency: '', name: '', callsign: '', assignment: '' };

        function navigateToSignIn() {
            document.getElementById('homepage-screen').classList.remove('screen-active');
            document.getElementById('signin-screen').classList.add('screen-active');
        }

        function authorizeRoster() {
            const callsignInput = document.getElementById('input-callsign').value.toUpperCase().trim();
            const nameInput = document.getElementById('input-name').value.trim();
            
            if (!callsignInput || !nameInput) {
                alert("ROSTER ERROR: Full Name and Call Sign are required.");
                return;
            }

            sessionData.agency = document.getElementById('input-agency').value.trim();
            sessionData.name = nameInput;
            sessionData.callsign = callsignInput;
            sessionData.assignment = document.getElementById('input-assignment').value;

            document.getElementById('hud-display-banner').innerText = `${sessionData.callsign} // ${sessionData.assignment}`;
            document.getElementById('signin-screen').classList.remove('screen-active');
            document.getElementById('tactical-screen').classList.add('screen-active');

            initializeTacticalSatelliteMap();
        }

        // INITIALIZE HIGH-RESOLUTION REAL SATELLITE IMAGERY ENGINE (FIXED MAP PIPELINE LINK)
        function initializeTacticalSatelliteMap() {
            if (tacticalMap !== null) return;

            tacticalMap = L.map('map-viewport', { zoomControl: false }).setView([37.525, -79.124], 14);

            // FIXED SATELLITE TILE LAYOUT URL PATHWAY ({z}/{y}/{x} format restoration)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'Tiles © Esri'
            }).addTo(tacticalMap);

            // Fetch secondary transparent road layers over satellite view so streets are labeled clearly
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(tacticalMap);

            // Support table-top tap configurations to drop custom simulated unit elements instantly
            tacticalMap.on('click', handleManualMapDrop);
            
            // Start continuous tracking stream loops immediately
            pollDatabaseMarkersLoop();
            setInterval(pollDatabaseMarkersLoop, 5000); 
        }

        async function searchTargetAddress() {
            const query = document.getElementById('address-field').value.trim();
            if (!query) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    tacticalMap.flyTo([lat, lon], 15);
                } else {
                    alert("Address corridor untraceable.");
                }
            } catch (e) { console.log("Search error"); }
        }

        function toggleLink() {
            linkActive = !linkActive;
            const btn = document.getElementById('link-btn');
            const status = document.getElementById('status-text');

            if (linkActive) {
                btn.innerText = "LINK ONLINE";
                btn.classList.add('btn-active');
                status.innerText = "BROADCAST TRANSMISSION ONLINE";
                status.style.color = "#00ff00";

                // LIVE REAL-TIME SATELLITE HARDWARE GPS ENABLED
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(handleLiveGps, handleGpsError, {
                        enableHighAccuracy: true,
                        timeout: 10000
                    });
                }
            } else {
                btn.innerText = "LINK OFFLINE";
                btn.classList.remove('btn-active');
                status.innerText = "SYSTEM READY // RADIO STANDBY";
                status.style.color = "#ff5252";

                if (watchId) navigator.geolocation.clearWatch(watchId);
                if (myMarker) { tacticalMap.removeLayer(myMarker); myMarker = null; }
            }
        }

        function handleLiveGps(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const coords = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            document.getElementById('sub-status').innerText = `LIVE SAT STREAM LOC: ${coords}`;

            tacticalMap.setView([lat, lng]);
            dropTacticalDot(lat, lng, sessionData.callsign, sessionData.assignment, true);
            transmitPacket(coords);
        }

        function handleManualMapDrop(e) {
            if (!linkActive) return;
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            const coords = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            
            dropTacticalDot(lat, lng, sessionData.callsign, sessionData.assignment, true);
            transmitPacket(coords);
        }

        // DRAW COLORED DOTS ON THE SATELLITE FEED ACCORDING TO DEPUTY DUTY ASSIGNMENT
        function dropTacticalDot(lat, lng, label, assignment, isMe) {
            let dotClass = 'tactical-dot-tracking';
            if (assignment === 'PERIMETER') dotClass = 'tactical-dot-perimeter';
            if (assignment === 'COMMAND') dotClass = 'tactical-dot-command';

            const customIcon = L.divIcon({ className: dotClass, iconSize: [12, 12] });

            if (isMe) {
                if (myMarker) tacticalMap.removeLayer(myMarker);
                myMarker = L.marker([lat, lng], { icon: customIcon }).addTo(tacticalMap).bindPopup(`<b>${label} (YOU)</b>`).openPopup();
            } else {
                const newM = L.marker([lat, lng], { icon: customIcon }).addTo(tacticalMap).bindPopup(`<b>${label}</b>`);
                databaseMarkers.push(newM);
            }
        }

        async function transmitPacket(coordinates) {
            try {
                const fullIdentity = `${sessionData.callsign} (${sessionData.name})`;
                await databases.createDocument('tacnet-search-app', 'tacnet_live_units', ID.unique(), {
                    'tacnet_live_units': fullIdentity,
                    'location': coordinates,
                    'operationalStatus': sessionData.assignment,
                    'lastUpdateTime': new Date().toLocaleTimeString().substring(0, 5)
                });
            } catch (err) {}
        }

        // PULL ALL ACTIVE SEARCHER ELEMENTS OUT OF DATABASE AND RE-DRAW THEM DYNAMICALLY
        async function pollDatabaseMarkersLoop() {
            if (tacticalMap === null) return;
            try {
                const response = await databases.listDocuments('tacnet-search-app', 'tacnet_live_units');
                
                // Clear out previous external tracking pins
                databaseMarkers.forEach(m => tacticalMap.removeLayer(m));
                databaseMarkers = [];

                response.documents.forEach(doc => {
                    if (doc.location && doc.location.includes(',')) {
                        const parts = doc.location.split(',');
                        const lat = parseFloat(parts[0]);
                        const lng = parseFloat(parts[1]);
                        
                        // Don't duplicate your own primary marker
                        if (doc.tacnet_live_units.split(' ')[0] !== sessionData.callsign) {
                            dropTacticalDot(lat, lng, doc.tacnet_live_units, doc.operationalStatus, false);
                        }
                    }
                });
            } catch (err) {}
        }

        function handleGpsError() { document.getElementById('sub-status').innerText = "SAT PIN DETACHED // RUNNING INTERACTIVE SIM MODE"; }
        function navigateToGate() { if (linkActive) toggleLink(); document.getElementById('tactical-screen').classList.remove('screen-active'); document.getElementById('homepage-screen').classList.add('screen-active'); }
        function openSearch() { document.getElementById('search-panel').style.display = 'flex'; RosterPanelUpdate(); }
        function closeSearch() { document.getElementById('search-panel').style.display = 'none'; }
        function toggleNvg() { nvgActive = !nvgActive; document.getElementById('nvg-btn').classList.toggle('btn-active'); document.getElementById('nvg-overlay').style.display = nvgActive ? 'block' : 'none'; }

        async function RosterPanelUpdate() {
            const container = document.getElementById('roster-results-container');
            container.innerHTML = '<div class="loading-text">SYNCING MAP LEDGER...</div>';
            try {
                const response = await databases.listDocuments('tacnet-search-app', 'tacnet_live_units');
                container.innerHTML = '';
                if (response.documents.length === 0) { container.innerHTML = '<div class="loading-text">NO ACTIVE TRANSMISSIONS FOUND</div>'; return; }
                response.documents.forEach(doc => {
                    container.insertAdjacentHTML('beforeend', `<div class="result-item"><div><div class="unit-name">${doc.tacnet_live_units}</div><div class="unit-status">ASSIGNMENT: ${doc.operationalStatus} // LOC: ${doc.location}</div></div><div class="unit-time">${doc.lastUpdateTime}</div></div>`);
                });
            } catch (err) {}
        }

        async function purgeServerRoster() {
            if (!confirm("Clear master grid ledger rows?")) return;
            try {
                const response = await databases.listDocuments('tacnet-search-app', 'tacnet_live_units');
                for (let doc of response.documents) { await databases.deleteDocument('tacnet-search-app', 'tacnet_live_units', doc.$id); }
                RosterPanelUpdate();
                databaseMarkers.forEach(m => tacticalMap.removeLayer(m));
                databaseMarkers = [];
            } catch (err) {}
        }
    </script>
</body>
</html>
