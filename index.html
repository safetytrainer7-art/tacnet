<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Virginia Instant Code Assistant - FINAL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050805;
  font-family: 'Georgia', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 450px;
  background: radial-gradient(circle at top, #163016 0%, #071007 80%);
  border-radius: 32px;
  padding: 20px;
  border: 2px solid rgba(255, 0, 0, 0.75);
  box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
  position: relative;
}

.badge {
  text-align: center;
  font-size: 58px;
  margin-bottom: 5px;
  color: #ffcf66;
  text-shadow: 0 0 10px gold;
}

h1 {
  text-align: center;
  font-size: 22px;
  line-height: 1.2;
  color: #dcb35b;
}

.sub {
  text-align: center;
  font-size: 10px;
  color: #d8b9a0;
  margin-top: 8px;
  margin-bottom: 15px;
}

.status {
  display: flex;
  justify-content: space-between;
  background: #081008;
  border: 1px solid rgba(255, 0, 0, 0.55);
  padding: 6px 12px;
  border-radius: 30px;
  font-size: 10px;
  color: #ff9999;
  margin-bottom: 15px;
}

.dot {
  width: 8px;
  height: 8px;
  background: red;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

.mic {
  background: linear-gradient(to bottom, #162416, #081008);
  border: 2px solid rgba(255, 0, 0, 0.8);
  border-radius: 90px;
  padding: 18px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 15px;
  transition: background 0.3s ease;
}

.mic.active {
  animation: glow 0.8s infinite;
  background: linear-gradient(to bottom, #301616, #1a0808);
}

@keyframes glow {
  0% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.4); }
  50% { box-shadow: 0 0 30px rgba(255, 0, 0, 1); }
  100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.4); }
}

.mic-icon {
  font-size: 52px;
  margin: 5px 0;
}

.mic-bottom {
  font-size: 10px;
  color: #d6b0b0;
}

.btn {
  width: 100%;
  background: linear-gradient(to bottom, #101a10, #091109);
  border: 2px solid rgba(255, 50, 50, 0.75);
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 10px;
  text-align: left;
  cursor: pointer;
  color: #ff9999;
  transition: transform 0.2s ease;
}

.btn:hover {
  transform: translateX(4px);
}

.btn-title {
  font-size: 18px;
  font-weight: bold;
}

.btn-sub {
  font-size: 10px;
  margin-top: 4px;
  color: #d4b4b4;
}

.result {
  display: none;
  background: #081108;
  border: 1px solid rgba(255, 0, 0, 0.65);
  border-radius: 18px;
  padding: 12px;
  margin-top: 15px;
  color: #f1d7d7;
  max-height: 350px;
  overflow-y: auto;
}

.result.show {
  display: block;
}

.result-title {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #ff9999;
  border-bottom: 1px solid red;
  padding-bottom: 5px;
}

.code {
  background: #0f180f;
  border-left: 3px solid #ff4444;
  padding: 10px;
  border-radius: 10px;
  line-height: 1.5;
  font-size: 12px;
  white-space: pre-wrap;
}

.category-item {
  padding: 8px;
  margin: 5px 0;
  background: #0a150a;
  border-radius: 10px;
  cursor: pointer;
  border-left: 2px solid #ff6666;
  transition: background 0.2s ease;
}

.category-item:hover {
  background: #1a2a1a;
}

.stop {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(to bottom, #4a0000, #180000);
  color: #ffaaaa;
  border: 2px solid rgba(255, 0, 0, 0.75);
}

.footer {
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  color: #FFD700;
  text-shadow: 0 0 5px #B8860B, 0 0 3px rgba(0,0,0,0.5);
  margin-top: 18px;
  line-height: 1.5;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 12px;
  letter-spacing: 0.5px;
}

.footer span {
  display: inline-block;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="app">
  <div class="badge">⭐</div>
  <h1>VIRGINIA INSTANT<br>CODE ASSISTANT</h1>
  <div class="sub">Criminal • Traffic • Game-Fish • Juvenile/Domestic</div>

  <div class="status">
    <div><span class="dot"></span> VA LIS DB LINKED</div>
    <div id="statusText">🎤 MIC READY</div>
  </div>

  <div class="mic" id="mic">
    <div class="mic-icon">🎤</div>
    <div class="mic-bottom">TAP & SPEAK - CODE OR DESCRIPTION</div>
  </div>

  <button class="btn" onclick="showCategory('criminal')">
    <div class="btn-title">⚖️ CRIMINAL LAW</div>
    <div class="btn-sub">Title 18.2 - Assault, Domestic, Grand Larceny, Trespass, Brandishing</div>
  </button>

  <button class="btn" onclick="showCategory('traffic')">
    <div class="btn-title">🚔 TRAFFIC LAW</div>
    <div class="btn-sub">Title 46.2 - DUI, Suspended License, Reckless Speed, Eluding, Equipment</div>
  </button>

  <button class="btn" onclick="showCategory('gamefish')">
    <div class="btn-title">🎣 GAME & FISH LAW</div>
    <div class="btn-sub">Title 29.1 - No License, Baiting, Sunday/Night Hunting, Trespassing</div>
  </button>

  <button class="btn" onclick="showCategory('juvenile')">
    <div class="btn-title">👨‍👩‍👧 JUVENILE & DOMESTIC</div>
    <div class="btn-sub">Titles 16.1 & 20 - Order Violations, Child Abuse/Neglect, Delinquency</div>
  </button>

  <div class="result" id="result">
    <div class="result-title" id="resultTitle">Virginia Code</div>
    <div class="code" id="resultText">Tap a category or speak a code or description</div>
  </div>

  <button class="stop" id="stopBtn">🔇 STOP TALKING</button>

  <div class="footer">
    ⭐ APP CREATOR ⭐<br>
    <span>EARL A. WOOD</span><br>
    DEPUTY SHERIFF (RETIRED)<br>
    VIRGINIA
  </div>
</div>

<script>
// ======================================================================
// COMPLETE HIGH-VOLUME FIELD ENFORCED FALLBACK DATABASE (VIRGINIA CODES)
// ======================================================================
const lawDB = {
  // ========== CRIMINAL LAW (TITLE 18.2) ==========
  "18.2-57": "ASSAULT AND BATTERY - Class 1 Misdemeanor. If committed against a full-time or part-time law-enforcement officer, firefighter, or emergency medical services personnel: Class 6 Felony with a mandatory minimum term of 6 months confinement.",
  "18.2-57.2": "DOMESTIC ASSAULT AND BATTERY - Assault and battery against a family or household member. Class 1 Misdemeanor. Third or subsequent offense within a 20-year period involving separate incidents: Class 6 Felony.",
  "18.2-51.6": "STRANGULATION - Knowingly, intentionally, and unlawfully impeding the blood circulation or respiration of another person by knowingly exerting pressure on the neck or throat, causing bodily injury. Class 6 Felony.",
  "18.2-95": "GRAND LARCENY - Committing larceny from the person of another of money/things worth $5 or more; or simple larceny not from the person of goods worth $1,000 or more; or larceny of any firearm. Felony punishable by 1 to 20 years.",
  "18.2-96": "PETIT LARCENY - Simple larceny from the person of another of items worth less than $5, or larceny not from the person of items worth less than $1,000. Class 1 Misdemeanor.",
  "18.2-119": "TRESPASS AFTER BEING FORBIDDEN - Entering or remaining on the land, structure, or premises of another after having been forbidden to do so, either orally or in writing by the owner or custodian. Class 1 Misdemeanor.",
  "18.2-137": "DESTRUCTION OF PROPERTY - Unlawfully destroying, defacing, or damaging any property real or personal. If value of damage is less than $1,000: Class 1 Misdemeanor. If damage is $1,000 or more: Class 6 Felony.",
  "18.2-282": "BRANDISHING A FIREARM - Pointing, holding, or brandishing any firearm or object similar in appearance into the view of another in such a manner as to reasonably induce fear of bodily injury. Class 1 Misdemeanor. If on school property: Class 6 Felony.",
  "18.2-388": "PUBLIC INTOXICATION - Profanely cursing or being intoxicated in public. Class 4 Misdemeanor. May be transported by law enforcement to a regional detoxification center in lieu of jail.",

  // ========== TRAFFIC LAW (TITLE 46.2 & 18.2) ==========
  "18.2-266": "DRIVING WHILE INTOXICATED (DUI) - Unlawful to drive or operate any motor vehicle with a blood alcohol concentration of 0.08 percent or more, or while under the influence of alcohol, drugs, or a combination. First offense: Class 1 Misdemeanor, minimum $250 fine, 1-year license administrative revocation.",
  "18.2-268.3": "REFUSAL OF TEST - Refusing to submit to a breath or blood test after a lawful DUI arrest. First offense: Administrative civil violation, automatic 1-year license suspension. Subsequent offenses within 10 years: Class 1 Misdemeanor.",
  "46.2-301": "DRIVING WHILE LICENSE SUSPENDED OR REVOKED - Operating a motor vehicle on a highway when driver's license or privilege has been suspended or revoked. Class 1 Misdemeanor. Third offense within 10 years requires a 10-day mandatory minimum jail sentence.",
  "46.2-300": "DRIVING WITHOUT A LICENSE - Operating a motor vehicle on a highway without a valid driver's license. First offense: Class 2 Misdemeanor. Second or subsequent offense: Class 1 Misdemeanor.",
  "46.2-852": "RECKLESS DRIVING (GENERAL RULE) - Driving a vehicle on any highway recklessly or at a speed or in a manner so as to endanger the life, limb, or property of any person. Class 1 Misdemeanor.",
  "46.2-862": "RECKLESS DRIVING BY SPEED - Driving a motor vehicle at a speed of 20 miles per hour or more over the speed limit, or in excess of 85 miles per hour regardless of the posted speed limit. Class 1 Misdemeanor.",
  "46.2-817": "ELUDING POLICE - Disregarding a visual or audible signal (lights and siren) by a law-enforcement officer to stop and attempting to escape. Class 2 Misdemeanor. If operation increases risk of injury or endangers the officer: Class 5 Felony.",
  "46.2-894": "HIT AND RUN - Duty of driver to stop, facilitate exchange of info, and render aid in the event of an accident involving injury, death, or attended property damage. If injury/death or damage over $1,000: Class 5 Felony.",
  "46.2-818.2": "USE OF HANDHELD COMMUNICATIONS DEVICE - Operating a moving motor vehicle on a highway while holding any handheld personal communications device. Traffic infraction: $125 fine for first offense, $250 fine for subsequent offenses.",

  // ========== GAME & FISH LAW (TITLE 29.1) ==========
  "29.1-335": "HUNTING, TRAPPING, OR FISHING WITHOUT LICENSE - Taking or attempting to take wild animals, birds, or fish without obtaining the required state or resident licenses. Class 3 Misdemeanor. Subject to additional replacement cost fees.",
  "29.1-521": "UNLAWFUL HUNTING / BAITING - Unlawful to hunt out of season, bag over limits, or knowingly occupy any baited area or put out bait/salt for wild animals for the purpose of taking or killing them. Class 3 Misdemeanor.",
  "29.1-521.1": "HUNTING OR TRAPPING ON LANDS OF ANOTHER - Going upon the prohibited, posted, or fenced lands of another to hunt, fish, or trap without verbal or written permission of the owner. Class 3 Misdemeanor.",
  "29.1-548": "NIGHT HUNTING - Hunting wild birds or wild animals between a half-hour after sunset and a half-hour before sunrise, specifically using artificial lights or spotlighting deer or elk. Class 2 Misdemeanor.",
  "29.1-553": "SELLING GAME FISH OR WILDLIFE - Unlawfully offering for sale, selling, purchasing, or trafficking game fish, wild birds, or wild animal carcasses. Class 1 Misdemeanor if under $1,000 valuation; Class 6 Felony if commercial value equals or exceeds $1,000.",

  // ========== JUVENILE & DOMESTIC (TITLE 16.1 & 20) ==========
  "16.1-253.2": "VIOLATION OF PROTECTIVE ORDER - Willfully violating any provision of a lawful Emergency, Preliminary, or Permanent Protective Order. Class 1 Misdemeanor. Mandatory minimum 1 day in jail. Second offense within 5 years: mandatory minimum 60 days jail. Third offense within 20 years involving an act of force: Class 6 Felony.",
  "16.1-278.4": "JUVENILE DELINQUENCY ENFORCEMENT - Grants authority to the Juvenile Court to dispose of charges where a child under 18 is adjudicated delinquent for actions that would be criminal if committed by an adult.",
  "16.1-278.5": "CHILD IN NEED OF SUPERVISION (CHINS) - Procedures for handling juveniles who are habitually truant from school or run away from parents, presenting a clear threat to their own safety.",
  "18.2-371.1": "ABUSE AND NEGLECT OF CHILDREN - Any parent or custodian whose willful act or omission causes or permits serious injury to the life or health of a child under 18. Class 4 Felony. If done with reckless disregard: Class 6 Felony.",
  "20-120": "FAILURE TO PAY CHILD SUPPORT / CONTEMPT - Willful failure to comply with a valid support order. Punishable as civil contempt with up to 12 months confinement or Class 6 Felony enforcement if flagrant evasion occurs."
};

const categoryCodes = {
  criminal: ["18.2-57", "18.2-57.2", "18.2-51.6", "18.2-95", "18.2-96", "18.2-119", "18.2-137", "18.2-282", "18.2-388"],
  traffic: ["18.2-266", "18.2-268.3", "46.2-301", "46.2-300", "46.2-852", "46.2-862", "46.2-817", "46.2-894", "46.2-818.2"],
  gamefish: ["29.1-335", "29.1-521", "29.1-521.1", "29.1-548", "29.1-553"],
  juvenile: ["16.1-253.2", "16.1-278.4", "16.1-278.5", "18.2-371.1", "20-120"]
};

const keywordMap = {
  "assault":"18.2-57", "battery":"18.2-57", "cop assault":"18.2-57",
  "domestic assault":"18.2-57.2", "family assault":"18.2-57.2", "domestic":"18.2-57.2",
  "strangulation":"18.2-51.6", "choking":"18.2-51.6", "strangle":"18.2-51.6",
  "grand larceny":"18.2-95", "felony theft":"18.2-95", "steal firearm":"18.2-95",
  "petit larceny":"18.2-96", "misdemeanor theft":"18.2-96", "shoplifting":"18.2-96",
  "trespass":"18.2-119", "trespassing":"18.2-119", "forbidden":"18.2-119",
  "destruction of property":"18.2-137", "vandalism":"18.2-137", "damaged property":"18.2-137",
  "brandishing":"18.2-282", "pointing firearm":"18.2-282", "showing gun":"18.2-282",
  "public intoxication":"18.2-388", "drunk in public":"18.2-388", "drunk":"18.2-388",
  "dui":"18.2-266", "drunk driving":"18.2-266", "dwi":"18.2-266",
  "refusal":"18.2-268.3", "refused breath":"18.2-268.3", "refused blood":"18.2-268.3",
  "driving suspended":"46.2-301", "suspended license":"46.2-301", "revoked":"46.2-301",
  "no license":"46.2-300", "no drivers license":"46.2-300", "unlicensed":"46.2-300",
  "reckless driving":"46.2-852", "reckless general":"46.2-852",
  "reckless speed":"46.2-862", "speeding":"46.2-862", "20 over":"46.2-862", "85 mph":"46.2-862",
  "eluding":"46.2-817", "fleeing":"46.2-817", "police chase":"46.2-817",
  "hit and run":"46.2-894", "leaving scene":"46.2-894",
  "holding phone":"46.2-818.2", "texting while driving":"46.2-818.2", "cellphone":"46.2-818.2",
  "no hunting license":"29.1-335", "no fishing license":"29.1-335",
  "baiting":"29.1-521", "hunting over bait":"29.1-521",
  "hunting land of another":"29.1-521.1", "posted land":"29.1-521.1",
  "night hunting":"29.1-548", "spotlighting":"29.1-548", "poaching":"29.1-548",
  "selling wildlife":"29.1-553", "trafficking deer":"29.1-553",
  "protective order":"16.1-253.2", "violating order":"16.1-253.2", "violation protective":"16.1-253.2",
  "juvenile delinquency":"16.1-278.4", "juvenile crime":"16.1-278.4",
  "chins":"16.1-278.5", "truancy":"16.1-278.5", "runaway":"16.1-278.5",
  "child abuse":"18.2-371.1", "child neglect":"18.2-371.1",
  "child support":"20-120", "back support":"20-120"
};

// ===================================================
// AUTHENTIC VA LIS DATA PORTAL ENGINE HOOK
// ===================================================
const LIS_CONFIG = {
  endpoint: "https://data.lis.virginia.gov/v1/api/codeofva",
  apiKey: "DD52A887-4E99-42B5-B9FA-6E9F76010272" // Pre-wired to your verified LIS institutional token
};

const resultDiv = document.getElementById("result");
const resultTitle = document.getElementById("resultTitle");
const resultText = document.getElementById("resultText");
const statusText = document.getElementById("statusText");
const mic = document.getElementById("mic");
const stopBtn = document.getElementById("stopBtn");

function speak(text) {
  window.speechSynthesis.cancel();
  let cleanText = text.replace(/-/g, " dash ").replace(/\./g, " point ");
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.rate = 0.85; // Medium-slow cadence optimized for operational comprehension
  utterance.pitch = 1.0;
  
  const voices = window.speechSynthesis.getVoices();
  const femaleVoice = voices.find(v => (v.name.includes("Female") || v.name.includes("Zira") || v.name.includes("Google US English")) && v.lang.includes("en"));
  if (femaleVoice) utterance.voice = femaleVoice;
  
  window.speechSynthesis.speak(utterance);
}

stopBtn.onclick = () => {
  window.speechSynthesis.cancel();
  statusText.innerHTML = "🔇 STOPPED";
  setTimeout(() => { statusText.innerHTML = "🎤 MIC READY"; }, 1500);
};

// Live dynamic connector interface
async function showCode(code) {
  statusText.innerHTML = "🔄 STREAMING LIVE LIS DATA...";
  
  try {
    const queryUrl = `${LIS_CONFIG.endpoint}?section=${encodeURIComponent(code)}`;
    const response = await fetch(queryUrl, {
      method: "GET",
      headers: {
        "X-API-KEY": LIS_CONFIG.apiKey,
        "Accept": "application/json"
      }
    });

    if (!response.ok) throw new Error("Database link error");

    const data = await response.json();
    
    resultDiv.classList.add("show");
    resultTitle.innerHTML = ` official code section: ${data.section || code} `;
    
    const cleanBody = data.bodyText || data.text || "No payload body processed from state link node.";
    const catchLine = data.catchLine || "Statutory Context Overview";
    
    resultText.innerHTML = `<strong>${catchLine}</strong><br><br>${cleanBody}`;
    speak(`${catchLine}. ${cleanBody}`);

  } catch (err) {
    console.warn("Forced network dropout fallback triggered. Instantly pulling from on-device cache.");
    displayOnDeviceFallback(code);
  }
}

function displayOnDeviceFallback(code) {
  const localLaw = lawDB[code];
  if (localLaw) {
    resultDiv.classList.add("show");
    resultTitle.innerHTML = `📖 ${code} - EMERGENCY LOCAL MEMORY`;
    resultText.innerHTML = localLaw;
    speak(localLaw);
  } else {
    resultDiv.classList.add("show");
    resultTitle.innerHTML = "⚠️ ENTRY UNRESOLVED";
    resultText.innerHTML = `Could not stream statute text for [${code}] from live LIS data networks or internal device tables.`;
    speak("Inquiry unresolved.");
  }
}

function showCategory(cat) {
  let codes = categoryCodes[cat];
  let title = "";
  switch(cat) {
    case "criminal": title = "⚖️ CRIMINAL LAW (Title 18.2)"; break;
    case "traffic": title = "🚔 TRAFFIC LAW (Title 46.2)"; break;
    case "gamefish": title = "🎣 GAME & FISH LAW (Title 29.1)"; break;
    case "juvenile": title = "👨‍👩‍👧 JUVENILE & DOMESTIC (Titles 16.1 & 18.2)"; break;
    default: title = "Virginia Code";
  }
  
  let html = `<div style="margin-bottom:10px;">Select an actively enforced section to view:</div>`;
  for (let code of codes) {
    let shortText = lawDB[code] ? lawDB[code].substring(0, 75) + "..." : "Query direct statute profile";
    html += `<div class="category-item" onclick="showCode('${code}')"><b>${code}</b><br><span style="font-size:10px;color:#aaa;">${shortText}</span></div>`;
  }
  
  resultDiv.classList.add("show");
  resultTitle.innerHTML = title;
  resultText.innerHTML = html;
  speak(`${cat} category deployed. Select a statute.`);
}

function searchByDescription(text) {
  let lowerText = text.toLowerCase().trim();
  let cleanedVoiceStr = lowerText.replace(/point/g, ".").replace(/dash/g, "-").replace(/\s+/g, "");
  let codeMatch = cleanedVoiceStr.match(/(\d+\.\d+\-\d+(\.\d+)?)/);
  if (codeMatch) return codeMatch[0];
  
  for (let [keyword, code] of Object.entries(keywordMap)) {
    if (lowerText.includes(keyword)) return code;
  }
  return null;
}

function processQuery(query) {
  let code = searchByDescription(query);
  if (code) {
    showCode(code);
  } else {
    resultDiv.classList.add("show");
    resultTitle.innerHTML = "❓ SEARCH EXHAUSTED";
    resultText.innerHTML = `Spoken command: "${query}"<br><br>No matching code number or specific legal keyword detected. Please tap a category manually or repeat statement clearly.`;
    speak("Inquiry not found. Please clarify keywords.");
  }
}

// Native Speech Processing Hook
let recognition = null;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = false;
  recognition.interimResults = false;
  
  recognition.onstart = () => {
    mic.classList.add("active");
    statusText.innerHTML = "🎤 LISTENING...";
  };
  
  recognition.onend = () => {
    mic.classList.remove("active");
    statusText.innerHTML = "🎤 MIC READY";
  };
  
  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript;
    statusText.innerHTML = `✅ "${spoken}"`;
    processQuery(spoken);
  };
  
  recognition.onerror = () => {
    statusText.innerHTML = "⚠️ TRANSMISSION FAILURE";
    mic.classList.remove("active");
  };
  
  mic.onclick = async () => {
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      recognition.start();
    } catch(err) {
      alert("Microphone configuration access blocked.");
      statusText.innerHTML = "🚫 MIC BLOCKED";
    }
  };
} else {
  statusText.innerHTML = "❌ AUDIO SPEECH HARDWARE CORES DETECTED AS OFFLINE";
  mic.style.opacity = "0.5";
}

window.showCode = showCode;
window.showCategory = showCategory;

// Ready signal execution
if (window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = () => {
    setTimeout(() => {
      speak("Virginia Instant Code Assistant active and connected to state portals.");
    }, 300);
  };
} else {
  setTimeout(() => {
    speak("Virginia Instant Code Assistant active and connected to state portals.");
  }, 500);
}
</script>
</body>
</html>
