
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Rugged, military-grade dark hunter green and high-contrast theme */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1d12; /* Dark Hunter Green */
            font-family: 'Courier New', Courier, monospace;
            color: #00ff66; /* Neon Green LED look */
            overflow: hidden;
        }

        /* Full screen tactical map backdrop */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Rugged, cracked gold lettering header */
        .tactical-header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 28px;
            font-weight: bold;
            color: #d4af37; /* Gold */
            text-shadow: 2px 2px 4px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            pointer-events: none;
        }

        /* Secure Login Overlay panel */
        #login-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 29, 18, 0.95); /* Solid Dark Green Shield */
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background-color: #07140c;
            border: 2px solid #d4af37; /* Gold Border */
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: #112217;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-family: monospace;
            box-sizing: border-box;
        }

        .tactical-btn {
            background-color: #d4af37;
            color: #07140c;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 4px 0 #997a15;
        }

        .tactical-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff66;
        }
    </style>
</head>
<body>

    <div class="tactical-header">TACNET SYSTEM ACTIVE</div>

    <div id="login-panel">
        <div class="login-box">
            <h2>MOCK SEARCH AUTHORIZATION</h2>
            <div class="input-group">
                <label>Duty Email / Unit ID</label>
                <input type="email" id="officer-email" placeholder="unit1 to unit6" required>
            </div>
            <div class="input-group">
                <label>Security Access Code</label>
                <input type="password" id="officer-pass" placeholder="Any 8 characters" required>
            </div>
            <button class="tactical-btn" onclick="verifyOfficerLogon()">Authorize Access</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let tacticalMap;
        let activeMarkers = {};
        
        // Setup a public mock broadcast room so phones can communicate directly tonight
        const testRoom = "tacnet-va-mock-search";
        const eventSource = new EventSource(`https://sse.nodeflux.org/rooms/${testRoom}/stream`);

        // Force authorization to bypass Appwrite's stuck cloud server
        function verifyOfficerLogon() {
            const email = document.getElementById('officer-email').value;
            const pass = document.getElementById('officer-pass').value;
            const status = document.getElementById('status-msg');

            if (email === "" || pass.length < 4) {
                status.style.color = "#ff3333";
                status.innerText = "INVALID ENTRY";
                return;
            }

            status.innerText = "DECRYPTING LINK...";

            setTimeout(() => {
                document.getElementById('login-panel').style.display = 'none';
                initializeTacticalMap(email);
            }, 800);
        }

        // Spin up the map grid and start broadcasting coordinates
        function initializeTacticalMap(officerEmail) {
            // Default center point over Virginia
            tacticalMap = L.map('map').setView([37.5, -79.0], 16);

            // High-precision live satellite imagery feed
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'TACNET SATELLITE COMMAND'
            }).addTo(tacticalMap);

            // Listen for other units walking around the yard and draw them live
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    // Don't draw our own duplicate marker from the stream
                    if (data.officer !== officerEmail) {
                        if (activeMarkers[data.officer]) {
                            activeMarkers[data.officer].setLatLng([data.latitude, data.longitude]);
                        } else {
                            activeMarkers[data.officer] = L.marker([data.latitude, data.longitude]).addTo(tacticalMap)
                                .bindPopup(`<b>${data.officer.toUpperCase()}</b>`)
                                .openPopup();
                        }
                    }
                } catch(e) {}
            };

            // Start hardware GPS tracking loop
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;

                        // Center map directly on your device
                        tacticalMap.setView([lat, lng]);

                        // Draw your personal marker pin
                        if (activeMarkers[officerEmail]) {
                            activeMarkers[officerEmail].setLatLng([lat, lng]);
                        } else {
                            activeMarkers[officerEmail] = L.marker([lat, lng]).addTo(tacticalMap)
                                .bindPopup(`<b>${officerEmail.toUpperCase()} (YOU)</b>`)
                                .openPopup();
                        }

                        // Broadcast your current GPS coords to the other guys' phones
                        fetch(`https://sse.nodeflux.org/rooms/${testRoom}/emit`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ officer: officerEmail, latitude: lat, longitude: lng })
                        }).catch(e => console.log("Network ping omitted"));
                    },
                    (err) => alert("GPS Signal Error. Turn on Location Services."),
                    { enableHighAccuracy: true }
                );
            } else {
                alert("Tactical Error: GPS Hardware undetected.");
            }
        }
    </script>
</body>
</html>
