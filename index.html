<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - Multi-Agency Task Force Search App</title>
    <!-- Tailwind CSS for clean layout grid -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Appwrite Web SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        html, body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col justify-start items-center">

    <!-- MAIN INTERFACE CONTAINER -->
    <div class="w-full max-w-[500px] min-h-screen flex flex-col bg-black border-x border-zinc-900 shadow-2xl">
        
        <!-- TOP SECTION: Your unbroken homepage artwork sits completely clear up top -->
        <div class="w-full relative">
            <img src="landing.jpg" alt="TACNET Layout" class="w-full h-auto block select-none">
        </div>

        <!-- BOTTOM SECTION: The login interface is locked strictly BELOW your image -->
        <div class="flex-grow bg-black px-6 py-6 flex flex-col justify-start items-center border-t border-zinc-800">
            
            <div id="login-portal" class="w-full bg-zinc-950 border border-zinc-800 p-5 rounded-md shadow-xl">
                <form id="auth-form" class="space-y-4 text-left">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-1 font-bold">Officer Name</label>
                        <input type="text" id="officer-name" required class="w-full bg-black border border-zinc-700/60 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="admin">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-1 font-bold">Passcode</label>
                        <input type="password" id="officer-password" required class="w-full bg-black border border-zinc-700/60 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="tacnet123">
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-[#dfb76c] to-[#b8934b] text-black font-black text-xs uppercase tracking-widest py-3 rounded shadow-lg hover:brightness-110 transition-all duration-200 active:scale-[0.97] mt-2">
                        Secure Access Login
                    </button>
                </form>
                <div id="auth-error" class="hidden mt-3 text-[10px] uppercase tracking-wider text-red-400 font-bold text-center"></div>
            </div>

            <!-- Operational System Link Status -->
            <div id="connection-status" class="mt-4 inline-flex items-center gap-1.5 text-[9px] text-emerald-400 tracking-widest uppercase font-mono">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                Appwrite Link Active
            </div>

        </div>

    </div>

    <!-- Core Appwrite & Master Override Logic -->
    <script>
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('tacnet-search-app');

        const account = new Appwrite.Account(client);

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const officerName = document.getElementById('officer-name').value.trim().toLowerCase();
            const password = document.getElementById('officer-password').value;
            const errorDiv = document.getElementById('auth-error');
            
            errorDiv.classList.add('hidden');

            // MASTER BYPASS: Clears the way directly into your app
            if (officerName === 'admin' && password === 'tacnet123') {
                window.location.href = 'dashboard.html';
                return;
            }

            // Standard Live Database Authentication (for other field officers later)
            const formattedEmail = `${officerName.replace(/\s+/g, '')}@tacnet.local`;
            try {
                await account.createEmailPasswordSession(formattedEmail, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.innerText = `Access Denied: ${error.message}`;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
