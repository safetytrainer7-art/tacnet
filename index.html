<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET // CENTRAL COMMAND MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020803;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        .app-screen {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            box-sizing: border-box;
        }

        /* --- STAGE 1: GATEWAY HOMEPAGE --- */
        #homepage-screen {
            background-color: #010401;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 5000;
        }

        .hero-image {
            max-width: 90%;
            max-height: 70vh;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            border-radius: 4px;
        }

        .homepage-footer {
            margin-top: 25px;
            color: #D4AF37;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        /* --- STAGE 2: SIGN-IN ROSTER --- */
        #signin-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #051609 0%, #010401 100%);
            z-index: 4000;
        }

        .roster-card {
            width: 350px;
            max-width: 90%;
            border: 1px solid #D4AF37;
            background-color: rgba(11, 37, 16, 0.95);
            padding: 25px;
            border-radius: 4px;
        }

        .roster-header {
            text-align: center;
            color: #D4AF37;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(214, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-weight: bold;
        }

        .roster-input {
            background-color: #020803;
            border: 1px solid rgba(214, 175, 55, 0.5);
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
        }

        .auth-btn {
            width: 100%;
            background-color: #020803;
            color: #D4AF37;
            border: 1.5px solid #D4AF37;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            margin-top: 15px;
        }

        /* --- STAGE 3: TACTICAL COMMAND DECK --- */
        #tactical-screen {
            display: none;
            flex-direction: column;
            z-index: 3000;
        }

        #nvg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 255, 0, 0.15);
            pointer-events: none;
            display: none;
            z-index: 999;
        }

        /* FLASHING SIREN OVERLAY SCREEN */
        #sos-siren-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 0, 0, 0.35);
            pointer-events: none;
            display: none;
            z-index: 4500;
            animation: flashSiren 0.8s infinite alternate;
            justify-content: center;
            align-items: center;
            border: 15px solid #ff5252;
            box-sizing: border-box;
        }

        @keyframes flashSiren {
            0% { background-color: rgba(255, 0, 0, 0.45); border-color: #ff5252; }
            100% { background-color: rgba(214, 175, 55, 0.25); border-color: #D4AF37; }
        }

        .sos-banner-text {
            color: #ffffff;
            background-color: #000000;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #ff5252;
            letter-spacing: 3px;
            box-shadow: 0 0 20px #ff5252;
        }

        .hud-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .back-arrow {
            background-color: rgba(2, 8, 3, 0.9);
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 6px;
        }

        .btn {
            background-color: rgba(2, 8, 3, 0.9);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.24);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            font-family: inherit;
        }

        .btn-active {
            background-color: rgba(0, 255, 0, 0.2) !important;
            border-color: #00FF00 !important;
            color: #00FF00 !important;
        }

        .btn-danger {
            background-color: rgba(255, 82, 82, 0.2) !important;
            border-color: #ff5252 !important;
            color: #ff5252 !important;
        }

        #map-viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .search-address-hud {
            position: absolute;
            top: 75px;
            left: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 1000;
            background-color: rgba(2, 8, 3, 0.9);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #D4AF37;
        }

        .search-row { display: flex; gap: 6px; }

        .address-input {
            flex: 1;
            background-color: #020803;
            border: 1px solid #D4AF37;
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
        }

        .go-btn {
            background-color: #0B2510;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 0 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: #D4AF37;
            font-weight: bold;
        }

        .radius-slider {
            flex: 1;
            accent-color: #00ff00;
            cursor: pointer;
        }

        .asset-deployment-hud {
            position: absolute;
            top: 175px;
            left: 15px;
            background-color: rgba(2, 8, 3, 0.95);
            border: 1px solid #D4AF37;
            padding: 8px;
            border-radius: 4px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .asset-select {
            background-color: #020803;
            color: #ffffff;
            border: 1px solid rgba(214, 175, 55, 0.5);
            font-family: inherit;
            font-size: 11px;
            padding: 4px;
        }

        /* K9 FIRST AID SCREEN CARD CONTAINER */
        #k9-medical-console {
            position: absolute;
            top: 175px;
            right: 15px;
            background-color: rgba(2, 8, 3, 0.95);
            border: 1px solid #ff5252;
            padding: 12px;
            border-radius: 4px;
            z-index: 1000;
            width: 220px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .med-title {
            color: #ff5252;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-align: center;
            border-bottom: 1px solid rgba(255,82,82,0.3);
            padding-bottom: 4px;
            margin-bottom: 4px;
        }

        .med-btn {
            background-color: #020803;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 6px;
            font-family: inherit;
            font-size: 10px;
            text-align: left;
            cursor: pointer;
            border-radius: 3px;
        }

        .med-btn:hover {
            border-color: #ff5252;
            background-color: rgba(255,82,82,0.1);
        }

        .lower-hud-ribbon {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(2, 8, 3, 0.9);
            border: 1px solid #0B2510;
            border-left: 4px solid #D4AF37;
            padding: 8px 15px;
            border-radius: 4px;
            z-index: 1000;
            text-align: center;
            min-width: 300px;
        }

        #status-text { font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        #sub-status { color: rgba(255, 255, 255, 0.5); font-size: 11px; margin-top: 2px; }

        .search-trigger {
            position: absolute;
            bottom: 25px;
            right: 15px;
            background-color: rgba(11, 37, 16, 0.9);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            width: 48px;
            height: 48px;
            border-radius: 4px;
            display: flex; 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
        }

        /* LEDGER TARGET MARKER DOT DEFINITIONS */

        .dot-drone { background-color: #808080 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 12px #808080; }
        .dot-article { background-color: #ffa500 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 12px #ffa500; }
        .dot-boat { background-color: #000000 !important; border: 2px solid #ffffff; border-radius: 4px; width: 14px; height: 14px; display: block; text-align:center; font-size:10px; line-height:14px; }
        .dot-submerged { background-color: #ffff00 !important; border: 2px solid black; border-radius: 4px; width: 14px; height: 14px; display: block; box-shadow: 0 0 12px #ffff00; }
        .dot-victim { background-color: #a52a2a !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 12px #a52a2a; }
        .dot-live-gps { background-color: #00ffff !important; border: 2.5px solid #ffffff; border-radius: 50%; width: 16px; height: 16px; display: block; box-shadow: 0 0 15px #00ffff; }

        /* --- STAGE 4: REGISTRY PANEL --- */
        #search-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #051207;
            padding: 30px 20px 20px 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            z-index: 2000;
            border: 4px solid #0B2510;
        }

        .search-header-layout { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-nav-group { display: flex; align-items: center; gap: 15px; }
        .search-main-title { color: #D4AF37; font-weight: bold; font-size: 18px; letter-spacing: 2px; }
        .purge-btn { background-color: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; font-family: inherit; font-size: 11px; cursor: pointer; }
        .registry-title { color: rgba(255, 255, 255, 0.38); font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .divider { border: 0; height: 1px; background: rgba(255, 255, 255, 0.12); margin-bottom: 15px; }
        #roster-results-container { flex: 1; overflow-y: auto; }
