<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TACNET COMMAND SYSTEM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
  body { background: #0b0f19; color: #ffffff; height: 100vh; display: flex; flex-direction: column; border: 4px solid #ef4444; }
  
  .header { background: #1e293b; padding: 10px; border-bottom: 2px solid #c5a059; text-align: center; }
  .sidebar { background: #0f172a; width: 100%; max-height: 50%; padding: 15px; overflow-y: auto; border-bottom: 3px solid #ef4444; }
  .map-space { flex: 1; background: #101726; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #c5a059; font-weight: bold; }
  
  .credit-card { border: 2px solid #c5a059; background: rgba(197, 160, 89, 0.1); padding: 8px; margin-bottom: 12px; text-align: center; border-radius: 6px; }
  .btn { width: 100%; padding: 12px; margin: 4px 0; border-radius: 6px; border: 2px solid #ef4444; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 12px; }
  
  .btn-sos { background: #ef4444; color: white; }
  .btn-terminate { background: #b91c1c; color: white; }
  .btn-action { background: #334155; color: white; border-color: #c5a059; }
  
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; color: #000000; z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
</style>
</head>
<body>

  <div class="header">
    <h2>TACNET OPERATIONAL CONSOLE</h2>
  </div>

  <div class="sidebar">
    <!-- APP CREATOR LOGS -->
    <div class="credit-card">
      <div style="font-size: 10px; color: #c5a059; font-weight: 900;">APP CREATOR</div>
      <div style="font-size: 16px; font-weight: bold;">EARL WOOD</div>
      <div style="font-size: 11px; color: #cbd5e1;">DEPUTY SHERIFF RETIRED VIRGINIA</div>
    </div>

    <!-- MASTER OPERATIONS COMMAND LIST -->
    <button class="btn btn-sos" onclick="runEmergencySOS()">🚨 EMERGENCY SOS OFFICER DOWN</button>
    <button class="btn btn-action" onclick="alert('Recording Replay Initialized Successfully.')">▶️ RECORDING REPLAY</button>
    <button class="btn btn-action" onclick="openReportView()">📋 VIEW REPORTS</button>
    <button class="btn btn-terminate" onclick="openReportView()">🛑 TERMINATE THE SEARCH</button>
  </div>

  <div class="map-space" id="statusBox">
    [ SYSTEM STANDBY — INPUT CHANNELS DEPLOYED ]
  </div>

  <!-- REPORTS WINDOW -->
  <div class="overlay" id="reportWindow">
    <h1 style="border-bottom: 3px solid #0f172a; padding-bottom: 10px;">TACNET CLOSURE DATA SHEET</h1>
    <p style="margin: 15px 0;"><strong>App Creator:</strong> Earl Wood, Deputy Sheriff (Ret.)</p>
    <p style="margin: 15px 0;"><strong>Mission Status:</strong> TERMINATED & LOCKED</p>
    <textarea style="width:100%; padding: 10px; margin-top: 10px;" rows="4" placeholder="Enter case summary logs here..."></textarea>
    <button class="btn" style="background:#0f172a; color:white; border:none; margin-top: 15px;" onclick="document.getElementById('reportWindow').style.display='none'">CLOSE REPORT</button>
  </div>

<script>
  function runEmergencySOS() {
    document.getElementById('statusBox').innerHTML = "<strong style='color:#ef4444; font-size:18px;'>🚨 ALERT: EMERGENCY SOS DISTRESS SIGNAL BROADCASTED WITH DIRECT GEOGRAPHIC NODES LOCKS.</strong>";
    alert("SOS TRANSMITTED.");
  }
  function openReportView() {
    document.getElementById('reportWindow').style.display = 'block';
  }
</script>
</body>
</html>
