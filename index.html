<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET — Multi-Agency Task Force + LIS Richmond</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #030c14;
            font-family: 'Courier New', 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            color: #0ff;
        }
        .app-shell {
            position: fixed;
            inset: 4px;
            border: 3px solid #ff0040;
            border-radius: 20px;
            box-shadow: 0 0 0 2px rgba(255,204,0,0.3), inset 0 0 20px rgba(0,255,200,0.1);
            background: radial-gradient(circle at 20% 30%, #041a24, #01060a);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .earth-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_earth_at_night.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            pointer-events: none;
        }
        .glass-card {
            background: rgba(0, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #ffcc00;
            border-radius: 28px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
        }
        .gold-text {
            font-family: 'Black Ops One', cursive;
            background: linear-gradient(135deg, #ffdf8c, #e6b422, #b37b00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 3rem;
        }
        input, select, textarea {
            background: #02131c;
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 10px;
            width: 100%;
            margin: 8px 0;
            border-radius: 12px;
            font-family: monospace;
        }
        button {
            background: linear-gradient(145deg, #c9a440, #9e7800);
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Black Ops One', cursive;
            letter-spacing: 1px;
            transition: 0.1s linear;
        }
        button:active { transform: translateY(2px); }
        .role-badge {
            display: inline-block;
            padding: 6px 12px;
            margin: 4px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.1s;
        }
        .role-badge.active { opacity: 1; border: 1px solid #ffcc00; }
        .dashboard { display: flex; flex: 1; overflow: hidden; }
        .map-area { flex: 3; position: relative; }
        #map { width: 100%; height: 100%; background: #010a12; }
        .sidebar {
            width: 280px;
            background: rgba(0, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            border-left: 2px solid #ffcc00;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .panel {
            background: rgba(0, 30, 40, 0.7);
            border: 1px solid #0ff;
            border-radius: 16px;
            padding: 10px;
        }
        .panel h4 { color: #ffcc00; font-size: 12px; margin-bottom: 6px; }
        .floating-compass {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 14px;
            display: flex;
            gap: 12px;
            z-index: 400;
        }
        .needle {
            width: 3px;
            height: 24px;
            background: #ff0040;
            margin: 0 auto;
            transform-origin: 50% 0%;
            transition: 0.1s;
        }
        .sos-btn {
            background: #ff0040;
            animation: pulse 0.8s infinite;
            color: white;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 #ff0040aa; } 100% { box-shadow: 0 0 0 12px transparent; } }
        .freehand-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            display: none;
            cursor: crosshair;
        }
        .freehand-canvas.active { display: block; pointer-events: auto; }
        .unit-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 8px currentColor;
        }
        .lis-result {
            background: #00161c;
            padding: 8px;
            font-size: 10px;
            max-height: 180px;
            overflow-y: auto;
            border-left: 3px solid #ffcc00;
            margin-top: 6px;
        }
    </style>
</head>
<body>
<div class="app-shell">
    <!-- LANDING SCREEN -->
    <div id="landingScreen" style="position:absolute; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); backdrop-filter:blur(8px);">
        <div class="earth-bg"></div>
        <div class="glass-card">
            <div class="gold-text">TACNET</div>
            <div style="font-size:11px;">Multi-Agency Task Force + LIS Richmond</div>
            <div style="font-size:9px; margin:5px 0;">Deputy Earl Wood (Ret.) · VA</div>
            <hr style="border-color:#ffcc00; margin:12px 0;">
            <div style="display:flex; gap:8px;">
                <button id="showCreateOp" style="flex:1;">➕ CREATE OP</button>
                <button id="showJoinOp" style="flex:1;">🔗 JOIN OP</button>
            </div>
            <div id="createOpPanel" style="display:none; margin-top:12px;">
                <input type="text" id="newOpName" placeholder="OPERATION NAME">
                <input type="text" id="newOpLoc" placeholder="LOCATION / ADDRESS">
                <button id="doCreateOp">▶ DEPLOY NEW OP</button>
            </div>
            <div id="joinOpPanel" style="display:none; margin-top:12px;">
                <input type="text" id="joinCodeInput" placeholder="6-CHAR SESSION CODE" maxlength="6" style="text-transform:uppercase">
                <button id="doJoinOp">▶ JOIN OP</button>
            </div>
            <input type="text" id="officerName" placeholder="LAST, FIRST NAME">
            <input type="text" id="officerAgency" placeholder="AGENCY (SHERIFF / VSP)">
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin:8px 0;">
                <div data-role="law_enforcement" class="role-badge" style="background:#2563EB;">LE</div>
                <div data-role="k9" class="role-badge" style="background:#38BDF8;">K9</div>
                <div data-role="sar" class="role-badge" style="background:#EF4444;">SAR</div>
                <div data-role="civilian" class="role-badge" style="background:#22C55E;">CIV</div>
                <div data-role="wanted_person" class="role-badge" style="background:#A855F7;">SUSPECT</div>
                <div data-role="drone" class="role-badge" style="background:#6B7280;">DRONE</div>
            </div>
            <button id="enterOpBtn" style="width:100%; background:#00ffcc; color:#000;">🚔 ENTER OPERATION</button>
            <div style="font-size:8px; text-align:center; margin-top:12px;">LIS Legislative Database Connected · Real-time GPS</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" style="display:none; flex-direction:column; height:100%;">
        <div style="background:#03161f; border-bottom:2px solid #ff0040; padding:8px 16px; display:flex; justify-content:space-between;">
            <span style="font-family:'Black Ops One'; color:#ffcc00;">TACNET</span>
            <span id="opCodeDisplay">——</span>
            <button id="backToLandingBtn" style="background:#333; padding:4px 12px;">← BACK</button>
            <button id="terminateOpBtn" style="background:#ff0040;">⛔ TERMINATE</button>
        </div>
        <div class="dashboard">
            <div class="map-area">
                <div id="map"></div>
                <canvas id="freeCanvas" class="freehand-canvas"></canvas>
                <div class="floating-compass">
                    <div style="width:40px; text-align:center;"><div id="compassNeedle" class="needle"></div><div style="font-size:8px;">N</div></div>
                    <div><div id="gpsStatus">GPS: acquiring...</div><div id="windData">WIND 6mph NW</div></div>
                </div>
            </div>
            <div class="sidebar">
                <div class="panel"><h4>📍 LIVE UNITS</h4><div id="unitsList" style="font-size:11px;"></div></div>
                <div class="panel"><h4>⚖️ LIS LEGAL (Richmond)</h4>
                    <select id="lisType"><option value="code">VA Code Section</option><option value="bill">Bill Number</option><option value="keyword">Keyword</option></select>
                    <input type="text" id="lisQuery" placeholder="e.g., 18.2-31 or HB1234">
                    <button id="searchLisBtn">🔍 SEARCH LIS</button>
                    <div id="lisResults" class="lis-result">Ready — API key active</div>
                </div>
                <div class="panel"><h4>📦 EVIDENCE</h4><input type="text" id="eviLabel" placeholder="Evidence description"><button id="logEviBtn">📌 LOG AT MY GPS</button><div id="evidenceList" style="font-size:10px;"></div></div>
                <div class="panel"><h4>📝 NOTES / DISPO</h4><textarea id="caseNotes" rows="2" placeholder="Search notes..."></textarea><textarea id="finalDispo" rows="2" placeholder="Final disposition..."></textarea><button id="genReportBtn">📄 GENERATE COURT REPORT</button></div>
                <button id="sosBtn" class="sos-btn">🚨 OFFICER DOWN SOS</button>
                <button id="freehandToggleBtn">✍️ FREEHAND DRAW</button>
                <button id="clearDrawBtn" style="display:none;">🗑️ CLEAR DRAW</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentOpCode = localStorage.getItem('tacnet_op_code');
    let currentOfficerId = localStorage.getItem('tacnet_officer_id');
    let myPosition = null;
    let map = null;
    let watchId = null;
    let activeMarkers = {};
    let freeDrawActive = false;
    let drawing = false;
    let ctx = null;
    let selectedRole = 'law_enforcement';
    let compassHeading = 0;
    
    const roleColors = { law_enforcement:'#2563EB', k9:'#38BDF8', sar:'#EF4444', civilian:'#22C55E', wanted_person:'#A855F7', drone:'#6B7280' };
    const roleNames = { law_enforcement:'LEO', k9:'K9', sar:'SAR', civilian:'CIV', wanted_person:'SUSPECT', drone:'DRONE' };
    
    function getOps() { return JSON.parse(localStorage.getItem('tacnet_ops') || '{}'); }
    function saveOps(ops) { localStorage.setItem('tacnet_ops', JSON.stringify(ops)); triggerSync(); }
    function triggerSync() { localStorage.setItem('tacnet_sync', Date.now().toString()); }
    window.addEventListener('storage', (e) => { if(e.key === 'tacnet_ops' || e.key === 'tacnet_sync') refreshUI(); });
    function refreshUI() { if(currentOpCode) { let ops = getOps(); let op = ops[currentOpCode]; if(op) { renderUnitsOnMap(op); updateUnitsList(op); updateEvidenceUI(op); } } }
    
    function createOperation(name, loc, creator) {
        let ops = getOps();
        let code = Math.random().toString(36).substring(2,8).toUpperCase();
        ops[code] = {
            code, name, location: loc, createdBy: creator, status: 'active',
            createdAt: new Date().toISOString(), officers: {}, evidence: [], sosEvents: [],
            perimeter: null, clearedCells: [], timeline: []
        };
        saveOps(ops);
        return code;
    }
    function joinOperation(code, officerName, agency, role) {
        let ops = getOps();
        let op = ops[code];
        if(!op) throw new Error('Operation not found');
        if(op.status === 'terminated') throw new Error('Operation terminated');
        let id = 'off_' + Date.now() + '_' + Math.floor(Math.random()*9999);
        op.officers[id] = {
            id, name: officerName, agency, role, color: roleColors[role],
            lat: null, lng: null, sos: false, lastSeen: Date.now()
        };
        saveOps(ops);
        return id;
    }
    function updateMyPosition(lat, lng) {
        if(!currentOpCode || !currentOfficerId) return;
        let ops = getOps();
        let op = ops[currentOpCode];
        if(op && op.officers[currentOfficerId]) {
            op.officers[currentOfficerId].lat = lat;
            op.officers[currentOfficerId].lng = lng;
            op.officers[currentOfficerId].lastSeen = Date.now();
            saveOps(ops);
            renderUnitsOnMap(op);
            updateUnitsList(op);
        }
    }
    function logEvidence(label) {
        if(!myPosition || !currentOpCode) return;
        let ops = getOps();
        let op = ops[currentOpCode];
        if(op) {
            op.evidence.push({
                id: Date.now(), label, lat: myPosition.lat, lng: myPosition.lng,
                time: new Date().toISOString(), officerId: currentOfficerId
            });
            saveOps(ops);
            updateEvidenceUI(op);
        }
    }
    function triggerSOS() {
        if(!myPosition || !currentOpCode || !currentOfficerId) return;
        let ops = getOps();
        let op = ops[currentOpCode];
        if(op && op.officers[currentOfficerId]) {
            op.officers[currentOfficerId].sos = true;
            if(!op.sosEvents) op.sosEvents = [];
            op.sosEvents.push({
                officerId: currentOfficerId,
                name: op.officers[currentOfficerId].name,
                lat: myPosition.lat, lng: myPosition.lng,
                time: new Date().toISOString()
            });
            saveOps(ops);
            renderUnitsOnMap(op);
            updateUnitsList(op);
            alert('🚨 SOS ACTIVATED — All units alerted! Check map.');
            document.body.style.animation = 'pulse 0.2s infinite';
            setTimeout(() => document.body.style.animation = '', 2000);
        }
    }
    function terminateOperation() {
        if(confirm('TERMINATE OPERATION? All data preserved for court report.')) {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            localStorage.removeItem('tacnet_op_code');
            localStorage.removeItem('tacnet_officer_id');
            currentOpCode = null;
            currentOfficerId = null;
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('landingScreen').style.display = 'flex';
            if(map) map.remove();
        }
    }
    
    function initMap() {
        map = L.map('map').setView([37.5, -79.5], 8);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Satellite' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'Street' }).addTo(map);
    }
    function renderUnitsOnMap(op) {
        if(!map) return;
        Object.values(activeMarkers).forEach(m => map.removeLayer(m));
        activeMarkers = {};
        Object.values(op.officers || {}).forEach(off => {
            if(off.lat && off.lng) {
                let icon = L.divIcon({ html: `<div class="unit-dot" style="background:${off.color}; box-shadow:0 0 10px ${off.color};"></div>`, iconSize: [18,18] });
                let marker = L.marker([off.lat, off.lng], { icon }).addTo(map);
                marker.bindPopup(`<b>${off.name}</b><br>${off.agency}<br>${roleNames[off.role]}${off.sos ? '<br><span style="color:#ff0040;">⚠ SOS</span>' : ''}`);
                activeMarkers[off.id] = marker;
            }
        });
    }
    function updateUnitsList(op) {
        let div = document.getElementById('unitsList');
        let officers = Object.values(op.officers || {});
        div.innerHTML = officers.map(off => `
            <div style="margin:4px 0; display:flex; justify-content:space-between;">
                <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${off.color};"></span> ${off.name} (${off.agency})</span>
                ${off.sos ? '<span style="color:#ff0040;">SOS</span>' : (off.lat ? '🟢' : '⚫')}
                <button onclick="window.removeOfficer('${off.id}')" style="background:#222; font-size:9px;">✖</button>
            </div>
        `).join('');
    }
    window.removeOfficer = function(id) {
        if(id === currentOfficerId) { alert('Cannot remove yourself'); return; }
        let ops = getOps();
        let op = ops[currentOpCode];
        if(op && op.officers[id]) { delete op.officers[id]; saveOps(ops); renderUnitsOnMap(op); updateUnitsList(op); }
    };
    function updateEvidenceUI(op) { document.getElementById('evidenceList').innerHTML = (op.evidence || []).slice(-5).reverse().map(e => `<div>📌 ${e.label} — ${new Date(e.time).toLocaleTimeString()}</div>`).join(''); }
    
    function startGPS() {
        if(!navigator.geolocation) return;
        watchId = navigator.geolocation.watchPosition(pos => {
            myPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            updateMyPosition(myPosition.lat, myPosition.lng);
            document.getElementById('gpsStatus').innerHTML = `GPS: ${myPosition.lat.toFixed(4)},${myPosition.lng.toFixed(4)}`;
            if(map && !map.getCenter().equals([myPosition.lat, myPosition.lng])) map.setView([myPosition.lat, myPosition.lng], 16);
        }, err => console.warn(err), { enableHighAccuracy: true });
    }
    
    async function queryLIS(type, query) {
        const resultsDiv = document.getElementById('lisResults');
        resultsDiv.innerHTML = '⏳ Querying Virginia LIS Database...';
        try {
            const response = await fetch(`https://lis-proxy.tacnet.workers.dev?type=${type}&query=${encodeURIComponent(query)}&key=${encodeURIComponent('YOUR_API_KEY')}`);
            const data = await response.json();
            if(data.error) resultsDiv.innerHTML = `❌ LIS Error: ${data.error}`;
            else resultsDiv.innerHTML = `<strong>📜 LIS Result (Richmond)</strong><br><pre style="font-size:9px;">${JSON.stringify(data, null, 2).substring(0, 800)}</pre>`;
        } catch(e) { resultsDiv.innerHTML = `❌ Proxy error: ${e.message}`; }
    }
    
    function setupCanvas() {
        let canvas = document.getElementById('freeCanvas');
        ctx = canvas.getContext('2d');
        function resize() { canvas.width = document.querySelector('.map-area').clientWidth; canvas.height = document.querySelector('.map-area').clientHeight; }
        window.addEventListener('resize', resize);
        resize();
        canvas.addEventListener('mousedown', (e) => { if(!freeDrawActive) return; drawing=true; let rect=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.clientX-rect.left, e.clientY-rect.top); ctx.strokeStyle='#ff0040'; ctx.lineWidth=3; });
        canvas.addEventListener('mousemove', (e) => { if(!drawing || !freeDrawActive) return; let rect=canvas.getBoundingClientRect(); ctx.lineTo(e.clientX-rect.left, e.clientY-rect.top); ctx.stroke(); });
        canvas.addEventListener('mouseup', () => drawing=false);
        canvas.addEventListener('touchstart', (e) => { if(!freeDrawActive) return; drawing=true; let rect=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { if(!drawing||!freeDrawActive) return; let rect=canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top); ctx.stroke(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => drawing=false);
    }
    
    setInterval(() => { compassHeading = (compassHeading + 2) % 360; document.getElementById('compassNeedle').style.transform = `rotate(${compassHeading}deg)`; }, 150);
    setInterval(() => { let w = 5 + Math.random() * 8; document.getElementById('windData').innerHTML = `WIND ${Math.round(w)}mph NW`; }, 3000);
    
    function generateCourtReport() {
        let ops = getOps();
        let op = ops[currentOpCode];
        if(!op) return;
        let notes = document.getElementById('caseNotes').value;
        let dispo = document.getElementById('finalDispo').value;
        let report = `
===== TACNET OFFICIAL COURT REPORT =====
Operation: ${op.name} (${op.code})
Location: ${op.location || 'N/A'}
Created: ${op.createdAt}
Status: ${op.status}
Personnel: ${Object.keys(op.officers).length}
Evidence: ${op.evidence?.length || 0}
SOS Events: ${op.sosEvents?.length || 0}

SEARCH NOTES:
${notes}

FINAL DISPOSITION:
${dispo}

TIMELINE / GPS LOGS:
${JSON.stringify(op.timeline || [], null, 2)}

Digitally signed by TACNET
Deputy Earl A. Wood (Ret.) - Virginia
        `;
        let blob = new Blob([report], {type: 'text/plain'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `TACNET_Report_${op.code}.txt`;
        a.click();
        alert('Report saved. For PDF, use browser Print.');
    }
    
    document.querySelectorAll('.role-badge').forEach(el => {
        el.onclick = () => { document.querySelectorAll('.role-badge').forEach(r => r.classList.remove('active')); el.classList.add('active'); selectedRole = el.dataset.role; };
    });
    document.getElementById('showCreateOp').onclick = () => { document.getElementById('createOpPanel').style.display='block'; document.getElementById('joinOpPanel').style.display='none'; };
    document.getElementById('showJoinOp').onclick = () => { document.getElementById('joinOpPanel').style.display='block'; document.getElementById('createOpPanel').style.display='none'; };
    document.getElementById('doCreateOp').onclick = () => {
        let name = document.getElementById('newOpName').value.trim();
        let loc = document.getElementById('newOpLoc').value.trim();
        if(!name) return alert('Operation name required');
        let code = createOperation(name, loc, document.getElementById('officerName').value || 'Officer');
        document.getElementById('joinCodeInput').value = code;
        alert(`Operation created! Code: ${code}`);
    };
    document.getElementById('doJoinOp').onclick = () => {
        let code = document.getElementById('joinCodeInput').value.toUpperCase();
        let ops = getOps();
        if(!ops[code]) return alert('Invalid operation code');
        currentOpCode = code;
        localStorage.setItem('tacnet_op_code', code);
        alert('Ready to join. Enter your details and press ENTER OPERATION.');
    };
    document.getElementById('enterOpBtn').onclick = () => {
        let name = document.getElementById('officerName').value.trim();
        let agency = document.getElementById('officerAgency').value.trim();
        if(!name || !agency) return alert('Enter name and agency');
        if(!currentOpCode) return alert('Create or join an operation first');
        try {
            let id = joinOperation(currentOpCode, name, agency, selectedRole);
            currentOfficerId = id;
            localStorage.setItem('tacnet_officer_id', id);
            document.getElementById('landingScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            initMap();
            setupCanvas();
            startGPS();
            refreshUI();
            setInterval(() => { if(currentOpCode) refreshUI(); }, 2500);
        } catch(e) { alert(e.message); }
    };
    document.getElementById('backToLandingBtn').onclick = () => { if(watchId) navigator.geolocation.clearWatch(watchId); document.getElementById('dashboardScreen').style.display = 'none'; document.getElementById('landingScreen').style.display = 'flex'; if(map) map.remove(); };
    document.getElementById('terminateOpBtn').onclick = terminateOperation;
    document.getElementById('logEviBtn').onclick = () => { let label = document.getElementById('eviLabel').value.trim(); if(label) { logEvidence(label); document.getElementById('eviLabel').value = ''; } };
    document.getElementById('sosBtn').onclick = triggerSOS;
    document.getElementById('freehandToggleBtn').onclick = () => { freeDrawActive = !freeDrawActive; document.getElementById('freeCanvas').classList.toggle('active', freeDrawActive); document.getElementById('clearDrawBtn').style.display = freeDrawActive ? 'block' : 'none'; if(freeDrawActive) map.dragging.disable(); else map.dragging.enable(); };
    document.getElementById('clearDrawBtn').onclick = () => { if(ctx) ctx.clearRect(0,0, document.getElementById('freeCanvas').width, document.getElementById('freeCanvas').height); };
    document.getElementById('searchLisBtn').onclick = () => { let type = document.getElementById('lisType').value; let query = document.getElementById('lisQuery').value.trim(); if(query) queryLIS(type, query); };
    document.getElementById('genReportBtn').onclick = generateCourtReport;
    
    if(currentOpCode && currentOfficerId) {
        document.getElementById('landingScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'flex';
        initMap();
        setupCanvas();
        startGPS();
        refreshUI();
        setInterval(() => { if(currentOpCode) refreshUI(); }, 2500);
    }
</script>
</body>
</html>
