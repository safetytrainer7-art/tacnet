<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TACNET - Landing Page</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  html, body {
    margin: 0; padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Bebas Neue', cursive, sans-serif;
    color: #f5d865; /* warm gold */
    background: #000000 url('IMAGE FOR TAC.png') no-repeat center center fixed;
    background-size: contain;
    -webkit-background-size: contain;
    -moz-background-size: contain;
    -o-background-size: contain;
    position: relative;
  }

  /* Light royal blue overlay to lighten backdrop */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 57, 153, 0.35); /* royal blue 35% transparent */
    pointer-events: none;
    z-index: 0;
  }

  /* Red neon border perimeter */
  body::before {
    content: '';
    position: fixed;
    top: 10px; bottom: 10px;
    left: 10px; right: 10px;
    pointer-events: none;
    border: 3px solid #FF3131;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131,
      inset 0 0 15px #FF3131;
    border-radius: 6px;
    z-index: 9999;
  }

  /* Glass royal blue overlay panel */
  .glass-panel {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 720px;
    background: rgba(9, 26, 70, 0.65);
    border-radius: 12px;
    box-shadow:
      0 0 30px rgba(0, 102, 255, 0.75),
      inset 0 0 10px rgba(255, 255, 255, 0.15);
    padding: 1.5rem 2rem;
    text-align: center;
    color: #e4c963;
    user-select: none;
    z-index: 1;
  }

  /* Gold cracked nickel raised text effect */
  h1 {
    font-size: 4rem;
    margin: 0;
    color: #d9b94e;
    text-shadow:
      1px 1px 0 #9c7e1a,
      2px 2px 2px #6e5910,
      3px 3px 5px #3c2f06;
    letter-spacing: 0.15em;
  }

  h3 {
    font-weight: normal;
    font-size: 1rem;
    letter-spacing: 0.1em;
    margin: 0.5rem 0 1rem 0;
    text-transform: uppercase;
    opacity: 0.8;
  }

  p.tagline {
    font-size: 1.1rem;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.08em;
  }

  .creator-credit {
    font-size: 0.9rem;
    margin-top: 2rem;
    font-weight: 600;
    opacity: 0.75;
  }

  /* Buttons with red neon border and royal blue glow */

  .btn {
    display: inline-block;
    padding: 1rem 3rem;
    margin: 1.5rem 1rem 0 1rem;
    font-size: 1.5rem;
    color: #e4c963;
    background: rgba(9, 26, 70, 0.85);
    border: 3px solid #FF3131;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow:
      0 0 10px #002366,
      0 0 20px #0044cc,
      0 0 30px #0066ffcc;
    transition: all 0.3s ease;
    user-select: none;
  }

  .btn:hover,
  .btn:focus {
    background: rgba(12, 38, 105, 1);
    box-shadow:
      0 0 20px #ff3a3a,
      0 0 30px #ff5151,
      0 0 40px #ff6b6b;
    color: #fff4a3;
    outline: none;
  }

  /* Centered container for buttons */
  .btn-container {
    margin-top: 1rem;
  }

  /* Responsive text scaling */
  @media (max-width: 600px) {
    h1 {
      font-size: 2.8rem;
    }
    .btn {
      font-size: 1.2rem;
      padding: 0.75rem 2rem;
    }
  }

</style>
</head>
<body>

  <div class="glass-panel" role="main" aria-label="TACNET Landing Page">
    <h1>TACNET</h1>
    <h3>MULTI-AGENCY-TASK-FORCE-SEARCH-APP</h3>
    <p class="tagline">USA'S FIRST MULTI-AGENCY FEDERAL-STATE-LOCAL APP BUILT BY LAW ENFORCEMENT FOR LAW ENFORCEMENT.</p>

    <div class="btn-container">
      <button class="btn" type="button" aria-label="Start Search">Start Search</button>
      <button class="btn" type="button" aria-label="Access Token Login">Access Token Login</button>
    </div>

    <p class="creator-credit">APP CREATOR EARL WOOD, DEPUTY SHERIFF RETIRED VIRGINIA</p>
  </div>

</body>
</html>
