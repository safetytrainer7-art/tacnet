<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TACNET - Landing Page</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  html, body {
    margin: 0; padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Bebas Neue', cursive, sans-serif;
    color: #f5d865; /* warm gold */
    background: #000000 url('IMAGE FOR TAC.png') no-repeat center center fixed;
    background-size: contain;
    -webkit-background-size: contain;
    -moz-background-size: contain;
    -o-background-size: contain;
    position: relative;
  }

  /* Red neon border perimeter */
  body::before {
    content: '';
    position: fixed;
    top: 10px; bottom: 10px;
    left: 10px; right: 10px;
    pointer-events: none;
    border: 3px solid #FF3131;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131,
      inset 0 0 15px #FF3131;
    border-radius: 6px;
    z-index: 9999;
  }

  /* Text container positioned top-left with some margin */
  .text-container {
    position: absolute;
    top: 5%;
    left: 5%;
    max-width: 320px;
    color: #d9b94e; /* gold */
    text-shadow:
      1px 1px 3px rgba(156, 126, 26, 0.4);
    user-select: none;
  }

  h1 {
    font-size: 2.5rem;
    margin: 0 0 0.2rem 0;
    letter-spacing: 0.15em;
  }

  h3 {
    font-weight: normal;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    margin: 0 0 0.5rem 0;
    text-transform: uppercase;
    opacity: 0.85;
    text-shadow: none;
  }

  p.tagline {
    font-size: 1rem;
    margin: 0 0 1rem 0;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-shadow: none;
    max-width: 320px;
  }

  .creator-credit {
    font-size: 0.8rem;
    font-weight: 600;
    opacity: 0.75;
    text-shadow: none;
  }

  /* Buttons positioned bottom-left with spacing */

  .btn-container {
    position: absolute;
    bottom: 5%;
    left: 5%;
  }

  .btn {
    display: inline-block;
    padding: 0.8rem 2rem;
    margin: 0 1rem 0 0;
    font-size: 1.2rem;
    color: #e4c963;
    background: rgba(9, 26, 70, 0.75);
    border: 3px solid #FF3131;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow:
      0 0 10px #002366,
      0 0 20px #0044cc,
      0 0 30px #0066ffcc;
    transition: all 0.3s ease;
    user-select: none;
  }

  .btn:hover,
  .btn:focus {
    background: rgba(12, 38, 105, 1);
    box-shadow:
      0 0 20px #ff3a3a,
      0 0 30px #ff5151,
      0 0 40px #ff6b6b;
    color: #fff4a3;
    outline: none;
  }

  @media (max-width: 600px) {
    h1 {
      font-size: 1.8rem;
    }
    h3 {
      font-size: 0.75rem;
    }
    p.tagline {
      font-size: 0.9rem;
      max-width: 260px;
    }
    .btn {
      font-size: 1rem;
      padding: 0.65rem 1.5rem;
      margin: 0 0.5rem 0 0;
    }
    .btn-container {
      bottom: 8%;
      left: 5%;
    }
  }
</style>
</head>
<body>

  <div class="text-container" role="main" aria-label="TACNET Landing Page">
    <h1>TACNET</h1>
    <h3>MULTI-AGENCY-TASK-FORCE-SEARCH-APP</h3>
    <p class="tagline">USA'S FIRST MULTI-AGENCY FEDERAL-STATE-LOCAL APP BUILT BY LAW ENFORCEMENT FOR LAW ENFORCEMENT.</p>
    <p class="creator-credit">APP CREATOR EARL WOOD, DEPUTY SHERIFF RETIRED VIRGINIA</p>
  </div>

  <div class="btn-container">
    <button class="btn" type="button" aria-label="Start Search">Start Search</button>
    <button class="btn" type="button" aria-label="Access Token Login">Access Token Login</button>
  </div>

</body>
</html>
