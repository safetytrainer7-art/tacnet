<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TACNET — Multi-Agency Task Force Search App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060e07;--bg2:#0b1a0d;--panel:#0f2012;--panel2:#132716;
  --border:#1e4024;--border2:#2a5530;
  --gold:#FFD700;--neon:#39FF14;--red:#FF2020;
  --text:#ffffff;--dim:#7aaa7e;
  --radius:12px;--rsm:7px;
}

/* ══════════════════════════════════════════
   UNIVERSAL SPACE BACKDROP & GLASS THEME
══════════════════════════════════════════ */
#space-backdrop {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background: #020617;
}

.card, .opanel, .repwrap, #side {
  background: rgba(10, 24, 12, 0.65) !important;
  backdrop-filter: blur(12px) saturate(160%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(160%) !important;
  border: 1.5px solid rgba(42, 85, 48, 0.5) !important;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

#shell, #s-land, #s-dash, #body {
  background: transparent !important;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}

/* iOS safe area */
@supports(padding:max(0px)){
  #shell{
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
  #ov-sos{bottom:calc(6px + env(safe-area-inset-bottom));}
  #ov-leg{bottom:calc(60px + env(safe-area-inset-bottom)) !important;}
  #ov-mob{bottom:calc(6px + env(safe-area-inset-bottom));}
}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* APP SHELL — red pinstripe border */
#shell{position:fixed;inset:0;border:2.5px solid var(--red);border-radius:var(--radius);overflow:hidden;box-shadow:0 0 0 1px rgba(255,32,32,.15),0 0 40px rgba(0,0,0,.9);display:flex;flex-direction:column;}

/* SCREENS */
.scr{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.scr.on{display:flex;}

/* ═══ LANDING ═══ */
#s-land{background:transparent;overflow-y:auto;align-items:center;justify-content:flex-start;padding:20px 16px 32px;}
.wrap{width:100%;max-width:860px;margin:auto;display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:720px){.wrap{grid-template-columns:55fr 45fr;}}

.card{padding:26px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);border:1px solid var(--red);opacity:.3;pointer-events:none;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--gold),var(--red),transparent);opacity:.7;}

/* TACNET logo text */
.logo-t1 {
  font-family: 'Black Ops One', cursive;
  font-size: clamp(50px, 9vw, 78px);
  line-height: .9;
  background: linear-gradient(135deg, rgba(255,215,0,0.9), rgba(255,255,255,0.2), rgba(255,215,0,0.9));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.logo-t2{font-family:'Black Ops One',cursive;font-size:clamp(11px,2vw,16px);color:var(--gold);letter-spacing:2px;margin-top:3px;line-height:1.3;}
.logo-t3{font-size:12px;color:var(--red);letter-spacing:2px;font-weight:700;margin-top:2px;text-transform:uppercase;}
.logo-t4{font-family:'Share Tech Mono',monospace;font-size:9.5px;color:var(--dim);letter-spacing:.8px;margin-top:7px;line-height:1.9;}

.pulse{width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Form elements */
.tabs{display:flex;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rsm);overflow:hidden;margin-bottom:16px;}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--dim);font-family:'Black Ops One',cursive;font-size:11px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.tab.on{background:var(--gold);color:#1a1200;}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.field label{font-family:'Share Tech Mono',monospace;font-size:9.5px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.field input,.field select{background:var(--bg2);border:1.5px solid var(--border2);color:#fff;padding:8px 10px;border-radius:var(--rsm);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;width:100%;}
.field input:focus,.field select:focus{border-color:var(--neon);}
.field input::placeholder{color:var(--dim);}
.rp-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.rp{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rsm);cursor:pointer;transition:all .2s;}
.rp .d{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.4);}
.rp span{font-size:7.5px;font-family:'Share Tech Mono',monospace;color:#fff;text-align:center;}
.rp.sel{border-color:var(--gold);background:rgba(255,215,0,.08);}
.go-btn{width:100%;padding:12px;border:none;border-radius:var(--rsm);background:linear-gradient(135deg,#c9a840,#FFD700,#c9a840);color:#1a1200;font-family:'Black Ops One',cursive;font-size:14px;letter-spacing:2px;cursor:pointer;margin-top:12px;box-shadow:0 4px 20px rgba(255,215,0,.3);transition:all .2s;}
.go-btn:hover{transform:translateY(-1px);}
.go-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
hr.div{border:none;border-top:1px solid var(--border);margin:8px 0;}

/* ═══ DASHBOARD ═══ */
#s-dash{background:transparent;}

/* Header */
#hdr{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--panel);border-bottom:2px solid var(--red);flex-shrink:0;flex-wrap:wrap;position:relative;}
#hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.3;}
.hlogo{font-family:'Black Ops One',cursive;font-size:20px;background:linear-gradient(135deg,#fff8a0,#FFD700,#c9a840);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;line-height:1;}
.hsub{font-family:'Share Tech Mono',monospace;font-size:8.5px;color:#fff;letter-spacing:1.5px;line-height:1.5;}
.hright{margin-left:auto;display:flex;gap:5px;align-items:center;flex-wrap:wrap;}

/* Address bar */
#addr-bar{display:none;align-items:center;gap:4px;flex:1;max-width:400px;}
#addr-bar input{flex:1;background:var(--bg2);border:1.5px solid var(--border2);color:#fff;padding:5px 9px;border-radius:var(--rsm);font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;}
#addr-bar input:focus{border-color:var(--neon);}
#addr-bar input::placeholder{color:var(--dim);}
#perim-adj{display:none;align-items:center;gap:3px;}

/* Body */
#body{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Side panel */
#side{width:275px;min-width:230px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:768px){#side{display:none;}}
.sscroll{flex:1;overflow-y:auto;padding:9px;}
.ssec{background:var(--panel2);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;margin-bottom:7px;position:relative;}
.ssec::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:2px;background:var(--red);border-radius:2px;opacity:.5;}
.stitle{font-family:'Black Ops One',cursive;font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:7px;}
.orow{display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--bg2);border-radius:var(--rsm);margin-bottom:3px;border:1px solid var(--border);}
.oname{font-weight:600;font-size:12px;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.arty{display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--bg2);border-radius:var(--rsm);margin-bottom:3px;border-left:3px solid var(--gold);}
.pbar{height:6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin:4px 0;}
.pfill{height:100%;background:var(--neon);border-radius:3px;transition:width .5s;}
.sstat{font-family:'Share Tech Mono',monospace;font-size:10px;color:#fff;}

/* Map */
#mapw{flex:1;position:relative;min-width:0;}
#map{width:100%;height:100%;}

/* Canvas for freehand */
#fcanvas{position:absolute;inset:0;z-index:550;display:none;cursor:crosshair;pointer-events:none;}
#fcanvas.active{pointer-events:auto;}

/* Overlays — desktop */
.ov{position:absolute;z-index:500;}
#ov-tl{top:10px;left:10px;}
#ov-tr{top:10px;right:10px;width:200px;}
#ov-leg{top:50%;left:10px;transform:translateY(-50%);}
#ov-sos{bottom:16px;right:14px;}
#ov-mob{bottom:16px;left:14px;display:none;}

/* ── MOBILE LAYOUT (phones) ── */
@media(max-width:768px){
  #side{display:none;}
  #hdr{padding:5px 8px;gap:5px;}
  .hlogo{font-size:16px;}
  .hsub{display:none;}
  #addr-bar{max-width:100%;flex:1;}
  #addr-bar input{font-size:10px;padding:4px 7px;}
  .hright{gap:3px;}
  .hright .btn{padding:4px 6px;}
  .hright .btn span{display:none;}
  #mapw{position:relative;}
  #ov-tl{top:6px;left:6px;padding:6px !important;}
  .cmp{width:48px !important;height:48px !important;}
  .cl{font-size:7px !important;}
  .cneedle{height:16px !important;}
  #wind-txt{font-size:7.5px !important;}
  #gps-txt{font-size:7.5px !important;}
  #ov-tr{top:6px;right:6px;width:auto !important;max-width:160px;}
  #ov-tr .btn{font-size:9px !important;padding:5px 7px !important;}
  #ov-tr #hint{font-size:7.5px !important;}
  #ov-leg{
    top:auto !important;bottom:60px !important;
    left:0 !important;right:0 !important;
    transform:none !important;
    width:100% !important;
    border-radius:0 !important;
    border-left:none !important;border-right:none !important;
  }
  #ov-leg > div:first-child{margin-bottom:4px;}
  #leg-list{
    display:flex !important;
    flex-direction:row !important;
    flex-wrap:nowrap !important;
    overflow-x:auto !important;
    gap:5px !important;
    padding-bottom:2px;
  }
  .legi{
    flex-direction:column !important;
    gap:3px !important;
    padding:5px 8px !important;
    flex-shrink:0 !important;
    min-width:54px !important;
    align-items:center !important;
    justify-content:center !important;
  }
  .leglbl{font-size:8px !important;text-align:center !important;white-space:normal !important;line-height:1.2 !important;}
  #ov-leg .leg-hint{display:none;}
  #ov-sos{bottom:6px;right:8px;}
  .sosbtn{font-size:10px !important;padding:8px 12px !important;letter-spacing:1px !important;}
  #ov-mob{display:block;bottom:6px;left:8px;}
  #ov-mob .opanel{padding:4px 8px !important;}
  #mob-txt{font-size:8px !important;}
  #perim-adj .btn{padding:3px 7px !important;font-size:13px !important;}
}

.opanel{position:relative;}
.opanel::before{content:'';position:absolute;inset:0;border-radius:var(--rsm);border:1px solid var(--red);opacity:.2;pointer-events:none;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--rsm);font-family:'Black Ops One',cursive;letter-spacing:1px;font-size:11px;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:#fff;transition:all .18s;white-space:nowrap;text-transform:uppercase;user-select:none;}
.btn:hover{background:var(--border2);}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.bfull{width:100%;justify-content:center;}
.bgold{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.07);}
.bgold:hover,.bgold.on{background:var(--gold);color:#1a1200;}
.bneon{border-color:var(--neon);color:var(--neon);background:rgba(57,255,20,.07);}
.bneon:hover,.bneon.on{background:var(--neon);color:#000;}
.bred{border-color:var(--red);color:#fff;background:rgba(255,32,32,.15);}
.bred:hover,.bred.on{background:var(--red);}
.bwarn{border-color:#F59E0B;color:#F59E0B;background:rgba(245,158,11,.08);}
.bwarn:hover{background:#F59E0B;color:#1a0f00;}
.bsm{padding:5px 8px;font-size:10px;}

/* SOS */
.sosbtn{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 20px;border-radius:var(--rsm);border:2px solid var(--red);background:#330000;color:#fff;font-family:'Black Ops One',cursive;font-size:13px;letter-spacing:3px;cursor:pointer;animation:sospulse 1.6s ease-in-out infinite;text-transform:uppercase;}
@media(max-width:768px){#ov-tr .btn span{display:inline !important;}}
@keyframes sospulse{0%,100%{box-shadow:0 0 0 2px rgba(255,32,32,.3),0 0 20px rgba(255,32,32,.2);}50%{box-shadow:0 0 0 6px rgba(255,32,32,.4),0 0 40px rgba(255,32,32,.5);}}

/* Compass */
.cmp{width:68px;height:68px;border-radius:50%;border:2px solid var(--gold);background:radial-gradient(circle,#182d1c,#0b1a0d 70%);position:relative;box-shadow:0 0 0 3px rgba(255,215,0,.1);flex-shrink:0;}
.cl{position:absolute;font-family:'Black Ops One',cursive;font-size:9px;line-height:1;}
.cl.N{top:3px;left:50%;transform:translateX(-50%);color:var(--gold);}
.cl.S{bottom:3px;left:50%;transform:translateX(-50%);color:#fff;}
.cl.E{right:3px;top:50%;transform:translateY(-50%);color:#fff;}
.cl.W{left:3px;top:50%;transform:translateY(-50%);color:#fff;}
.cneedle{position:absolute;left:50%;top:50%;width:3px;height:24px;background:linear-gradient(to bottom,var(--red) 50%,#fff 50%);transform-origin:50% 100%;transform:translate(-50%,-100%) rotate(0deg);transition:transform .35s ease-out;border-radius:2px 2px 0 0;}
.cpivot{position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);}
.wflag{width:19px;height:11px;background:var(--neon);clip-path:polygon(0 0,100% 0,80% 50%,100% 100%,0 100%);animation:wv 1.5s ease-in-out infinite alternate;transform-origin:left center;}
@keyframes wv{from{transform:skewY(-4deg);}to{transform:skewY(4deg);}}

/* Map markers */
.odot{width:20px;height:20px;border-radius:50%;border:2.5px solid rgba(255,255,255,.85);animation:mpulse 2.2s infinite ease-out;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 currentColor;}70%{box-shadow:0 0 0 8px transparent;}}
.sdot2{width:30px;height:30px;border-radius:50%;background:var(--red);border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',cursive;font-size:8px;color:#fff;animation:sblink .6s infinite alternate;}
@keyframes sblink{from{box-shadow:0 0 8px rgba(255,32,32,.4);}to{box-shadow:0 0 22px rgba(255,32,32,1);}}
.apin{width:24px;height:24px;border-radius:50%;background:var(--panel);border:2px solid #F97316;display:flex;align-items:center;justify-content:center;font-size:11px;}
.lpin{width:22px;height:22px;border-radius:50%;background:var(--panel);border:2px solid #FF8C00;display:flex;align-items:center;justify-content:center;font-size:10px;}
.adrdot"></div>{width:13px;height:13px;border-radius:50%;background:var(--red);border:2.5px solid #fff;box-shadow:0 0 10px rgba(255,32,32,.8);animation:sblink .8s infinite alternate;}
.pupin{width:20px;height:20px;border-radius:50%;border:2.5px solid #fff;cursor:pointer;}

/* Legend */
.legi{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:var(--rsm);cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:2px;}
.legi:hover{background:rgba(255,255,255,.06);border-color:var(--border2);}
.legi.active{background:rgba(255,215,0,.1);border-color:var(--gold);}
.legdot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.5);flex-shrink:0;}
.leglbl{font-family:'Share Tech Mono',monospace;font-size:9.5px;color:#fff;white-space:nowrap;}

/* Leaflet */
.leaflet-container{background:#0a140b!important;}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--panel)!important;color:#fff!important;border:1px solid var(--border2);border-radius:var(--rsm)!important;}
.leaflet-popup-content{font-family:'Rajdhani',sans-serif!important;color:#fff!important;}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--gold)!important;border-color:var(--border2)!important;border-radius:var(--rsm)!important;}
.leaflet-control-attribution{background:rgba(10,20,11,.7)!important;color:var(--dim)!important;font-size:9px!important;}

/* Night vision */
.nv{filter:hue-rotate(55deg) saturate(200%) brightness(1.08) contrast(1.1);}
.nvov{position:fixed;inset:0;pointer-events:none;z-index:9000;background:radial-gradient(circle at 50% 50%,rgba(57,255,20,0) 35%,rgba(0,0,0,.5) 100%);}
.nvov::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,rgba(0,0,0,.12) 0,rgba(0,0,0,.12) 1px,transparent 1px,transparent 3px);}
.nvov::after{content:'';position:absolute;inset:0;background:rgba(57,255,20,.12);mix-blend-mode:screen;}

/* Toast */
.tst{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:var(--rsm);z-index:10000;font-family:'Share Tech Mono',monospace;font-size:11px;pointer-events:none;animation:tin .2s ease,tout .3s ease 2.6s forwards;white-space:nowrap;}
.tst.ok{background:#082010;border:1.5px solid var(--neon);color:var(--neon);}
.tst.er{background:#200808;border:1.5px solid var(--red);color:#ff8080;}
.tst.in{background:#081020;border:1.5px solid #4488ff;color:#88aaff;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes tout{from{opacity:1;}to{opacity:0;}}

/* Terminated */
#s-term{display:none;position:fixed;inset:0;z-index:9990;background:rgba(4,10,5,.97);align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#s-term.on{display:flex;}

/* Report */
#s-rep{display:none;position:fixed;inset:0;z-index:9995;overflow-y:auto;padding:18px;}
#s-rep.on{display:block;}
.repwrap{max-width:900px;margin:0 auto;padding:30px;position:relative;}
.repwrap::before{content:'';position:absolute;inset:0;border-radius:var(--radius);border:1.5px solid var(--red);opacity:.28;pointer-events:none;}

/* Token */
#s-tok{display:none;position:fixed;inset:0;z-index:9996;background:rgba(4,10,5,.96);align-items:center;justify-content:center;}
#s-tok.on{display:flex;}
.tokwrap{background:var(--panel);border:2px solid var(--border2);border-radius:var(--radius);padding:26px;max-width:350px;width:90%;position:relative;}
.tokwrap::before{content:'';position:absolute;inset:0;border-radius:var(--radius);border:1.5px solid var(--red);opacity:.28;pointer-events:none;}
.tokval{font-family:'Black Ops One',cursive;font-size:28px;color:var(--gold);letter-spacing:6px;text-align:center;padding:13px;background:var(--bg);border:1.5px dashed var(--gold);border-radius:var(--rsm);margin:10px 0;}
.codebadge{display:inline-block;padding:3px 10px;background:var(--bg);border:1.5px dashed var(--gold);color:var(--gold);font-family:'Black Ops One',cursive;letter-spacing:4px;font-size:13px;border-radius:var(--rsm);}

@media print{
  body{background:#fff!important;color:#000!important;}
  #s-rep{position:static;background:#fff;}
  .repwrap{background:#fff;border:2px solid #333;color:#000;}
  .noprint{display:none!important;}
}
</style>
</head>
<body>
<div id="shell">

<div id="s-land" class="scr on">
  <div class="wrap">

    <div class="card">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:14px;">
        <div class="pulse"></div>
        <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--neon);letter-spacing:2px;">OPERATIONAL STATUS · ONLINE · LIVE GPS</span>
      </div>

      <div class="logo-t1">TACNET</div>
      <div class="logo-t2">Multi-Agency Task Force Search App</div>
      <div class="logo-t3">Federal · State · Local</div>
      <div class="logo-t4">
