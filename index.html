<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Rugged, military-grade dark hunter green and high-contrast theme */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1d12; /* Dark Hunter Green */
            font-family: 'Courier New', Courier, monospace;
            color: #00ff66; /* Neon Green LED look */
            overflow: hidden;
        }

        /* Full screen tactical map backdrop */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Rugged, cracked gold lettering header */
        .tactical-header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 24px;
            font-weight: bold;
            color: #d4af37; /* Gold */
            text-shadow: 2px 2px 4px #000, -1px -1px 0 #000, 1px -1px 0 #000;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }

        /* Secure Login Overlay panel */
        #login-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 29, 18, 0.95); /* Solid Dark Green Shield */
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background-color: #07140c;
            border: 2px solid #d4af37; /* Gold Border */
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: #112217;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-family: monospace;
            box-sizing: border-box;
        }

        .tactical-btn {
            background-color: #d4af37;
            color: #07140c;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 4px 0 #997a15;
        }

        .tactical-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff66;
        }

        /* Complete Command Module Dashboard (Overlay elements) */
        .dashboard-overlay {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .dashboard-card {
            background-color: rgba(7, 20, 12, 0.9);
            border: 1px solid #00ff66;
            border-left: 4px solid #d4af37;
            padding: 12px;
            border-radius: 4px;
            pointer-events: auto;
            max-height: 180px;
            overflow-y: auto;
        }

        .card-title {
            color: #d4af37;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px dashed #00ff66;
            padding-bottom: 4px;
        }

        .med-grid {
            display: flex;
            gap: 5px;
        }

        .med-btn {
            background-color: #112217;
            border: 1px solid #d4af37;
            color: #00ff66;
            font-family: monospace;
            font-size: 11px;
            padding: 6px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .med-btn:hover, .med-btn.active {
            background-color: #d4af37;
            color: #07140c;
        }

        #med-instructions {
            margin-top: 8px;
            font-size: 11px;
            line-height: 1.4;
            color: #ffffff;
            background: #020704;
            padding: 6px;
            border-radius: 3px;
        }

        .roster-list {
            font-size: 12px;
            margin: 0;
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="tactical-header">TACNET MULTI-AGENCY TASK FORCE</div>

    <div id="login-panel">
        <div class="login-box">
            <h2>TACTICAL LOGIN</h2>
            <div class="input-group">
                <label>Duty Email / Unit ID</label>
                <input type="email" id="officer-email" placeholder="e.g., unit1, unit2" required>
            </div>
            <div class="input-group">
                <label>Security Access Code</label>
                <input type="password" id="officer-pass" placeholder="••••••••" required>
            </div>
            <button class="tactical-btn" onclick="verifyOfficerLogon()">Authorize Access</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="dashboard-overlay" id="main-dashboard" style="display: none;">
        <div class="dashboard-card">
            <div class="card-title">Active Mission Roster</div>
            <ul class="roster-list" id="mission-roster">
                <li>Waiting for active unit pings...</li>
            </ul>
        </div>

        <div class="dashboard-card">
            <div class="card-title">K9 Emergency Medical Module (Hands-Free Active)</div>
            <div class="med-grid">
                <button class="med-btn" onclick="showMed('cpr')">K9 CPR</button>
                <button class="med-btn" onclick="showMed('snake')">SNAKE BITE</button>
                <button class="med-btn" onclick="showMed('bleed')">BLEEDING</button>
            </div>
            <div id="med-instructions">Select emergency medical protocols above to display instant tactical instructions.</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let tacticalMap;
        let activeMarkers = {};
        
        // Setup the secure public broadcast stream for tonight's field exercise
        const testRoom = "tacnet-va-mock-search";
        const eventSource = new EventSource(`https://sse.nodeflux.org/rooms/${testRoom}/stream`);

        // Handle Medical Module Display Changes
        const medProtocols = {
            cpr: "<b>[K9 CPR PROTOCOL]</b><br>1. Lay K9 on right side. <br>2. Compress chest 100-120 BPM over widest part of ribcage.<br>3. 30 compressions to 2 breaths. Clear airway.",
            snake: "<b>[K9 SNAKE BITE PROTOCOL]</b><br>1. Restrict movement immediately; keep bite below heart level.<br>2. DO NOT cut or apply ice.<br>3. Identify species if safe. Transport rapidly to emergency vet.",
            bleed: "<b>[K9 EXCESSIVE BLEEDING]</b><br>1. Apply direct pressure using sterile field dressing.<br>2. Elevate limb if applicable.<br>3. Apply pressure bandage. If bleeding breaks through, add layer; do not remove base bandage."
        };

        function showMed(type) {
            document.getElementById('med-instructions').innerHTML = medProtocols[type];
        }

        // Grant instant entry and unlock complete system dashboard
        function verifyOfficerLogon() {
            const email = document.getElementById('officer-email').value;
            const pass = document.getElementById('officer-pass').value;
            const status = document.getElementById('status-msg');

            if (email === "" || pass.length < 4) {
                status.style.color = "#ff3333";
                status.innerText = "INVALID OPERATIONAL ENTRY";
                return;
            }

            status.innerText = "SYNCHRONIZING SECURE CHANNELS...";

            setTimeout(() => {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'flex';
                initializeTacticalMap(email);
            }, 800);
        }

        // Spin up the map grid and engage satellite operational view
        function initializeTacticalMap(officerEmail) {
            // Center tracking viewpoint over Virginia
            tacticalMap = L.map('map').setView([37.5, -79.0], 16);

            // High-precision live satellite imagery feed
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'TACNET SATELLITE COMMAND'
            }).addTo(tacticalMap);

            // Update the Mission Roster Board
            function updateRosterUI() {
                const rosterEl = document.getElementById('mission-roster');
                rosterEl.innerHTML = "";
                
                // Put your callsign at the top
                const myLi = document.createElement('li');
                myLi.style.color = "#d4af37";
                myLi.innerHTML = `<b>${officerEmail.toUpperCase()} [BASE COMMAND] (YOU)</b>`;
                rosterEl.appendChild(myLi);

                // Add active tracking units
                Object.keys(activeMarkers).forEach(unit => {
                    if (unit !== officerEmail) {
                        const li = document.createElement('li');
                        li.innerText = `${unit.toUpperCase()} [FIELD UNIT] - ACTIVE SIGNAL`;
                        rosterEl.appendChild(li);
                    }
                });
            }

            // Listen for other units walking around the yard and update map pins + roster live
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.officer && data.officer !== officerEmail) {
                        if (activeMarkers[data.officer]) {
                            activeMarkers[data.officer].setLatLng([data.latitude, data.longitude]);
                        } else {
                            activeMarkers[data.officer] = L.marker([data.latitude, data.longitude]).addTo(tacticalMap)
                                .bindPopup(`<b>${data.officer.toUpperCase()}</b>`)
                                .openPopup();
                        }
                        updateRosterUI();
                    }
                } catch(e) {}
            };

            // Start hardware GPS tracking loop
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;

                        // Center map directly on your device
                        tacticalMap.setView([lat, lng]);

                        // Draw your personal marker pin
                        if (activeMarkers[officerEmail]) {
                            activeMarkers[officerEmail].setLatLng([lat, lng]);
                        } else {
                            activeMarkers[officerEmail] = L.marker([lat, lng]).addTo(tacticalMap)
                                .bindPopup(`<b>${officerEmail.toUpperCase()} (YOU)</b>`)
                                .openPopup();
                        }

                        updateRosterUI();

                        // Broadcast your current GPS coords to the other guys' phones
                        fetch(`https://sse.nodeflux.org/rooms/${testRoom}/emit`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ officer: officerEmail, latitude: lat, longitude: lng })
                        }).catch(e => console.log("Network ping omitted"));
                    },
                    (err) => alert("GPS Signal Error. Turn on Location Services."),
                    { enableHighAccuracy: true }
                );
            } else {
                alert("Tactical Error: GPS Hardware undetected.");
            }
            
            // Render basic roster right away
            updateRosterUI();
        }
    </script>
</body>
</html>
