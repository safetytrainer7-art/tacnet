<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - Multi-Agency Task Force Search App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
</head>
<body class="bg-[#02040a] text-white font-sans min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat" 
         style="background-image: url('landing.jpg');">
    </div>

    <div class="relative z-10 flex flex-col justify-end items-center w-full min-h-screen pb-12 px-4 bg-gradient-to-t from-black/80 via-transparent to-transparent">
        
        <div id="connection-status" class="mb-4 inline-flex items-center gap-1.5 bg-black/90 px-4 py-1.5 rounded border border-emerald-500/40 text-[10px] text-emerald-400 tracking-widest uppercase font-mono shadow-md">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
            Appwrite Operational
        </div>

        <div id="login-portal" class="bg-black/95 border border-zinc-800 p-5 rounded-md w-full max-w-sm shadow-2xl backdrop-blur-md">
            <form id="auth-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-1 font-bold">Agency Email</label>
                    <input type="email" id="officer-email" required class="w-full bg-zinc-950 border border-zinc-700/60 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="officer@agency.gov">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-1 font-bold">Secure PIN / Password</label>
                    <input type="password" id="officer-password" required class="w-full bg-zinc-950 border border-zinc-700/60 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-[#dfb76c] to-[#b8934b] text-black font-black text-xs uppercase tracking-widest py-3 rounded shadow-lg hover:brightness-110 transition-all duration-200 active:scale-[0.97] mt-1">
                    Secure Access Login
                </button>
            </form>
            <div id="auth-error" class="hidden mt-3 text-[10px] uppercase tracking-wider text-red-400 font-bold text-center"></div>
        </div>

    </div>

    <script>
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('tacnet-search-app');

        const account = new Appwrite.Account(client);

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('officer-email').value;
            const password = document.getElementById('officer-password').value;
            const errorDiv = document.getElementById('auth-error');
            
            errorDiv.classList.add('hidden');

            try {
                await account.createEmailPasswordSession(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.innerText = `Access Denied: ${error.message}`;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
