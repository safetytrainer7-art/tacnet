<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - Multi-Agency Task Force Search App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
</head>
<body class="bg-[#02040a] text-white font-sans min-h-screen flex flex-col items-center justify-center p-0 m-0 overflow-x-hidden">

    <div class="relative w-full max-w-[500px] aspect-[9/16] bg-black shadow-2xl overflow-hidden border border-zinc-900">
        
        <img src="landing.jpg" alt="TACNET Landing Page" class="absolute inset-0 w-full h-full object-cover z-0">

        <div class="absolute inset-0 z-10 flex flex-col justify-end items-center pb-[8%] px-6 bg-gradient-to-t from-black/90 via-black/20 to-transparent">
            
            <div id="connection-status" class="mb-3 inline-flex items-center gap-1.5 bg-black/90 px-3 py-1 rounded-full border border-emerald-500/40 text-[10px] text-emerald-400 tracking-widest uppercase shadow-md font-mono">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                Appwrite Link Active
            </div>

            <div id="login-portal" class="bg-black/95 border border-zinc-800/80 p-4 rounded-md w-full max-w-[340px] shadow-2xl backdrop-blur-md mb-2">
                <form id="auth-form" class="space-y-3 text-left">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-0.5 font-bold">Agency Email</label>
                        <input type="email" id="officer-email" required class="w-full bg-zinc-950/90 border border-zinc-700/60 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="officer@agency.gov">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-0.5 font-bold">Secure PIN / Password</label>
                        <input type="password" id="officer-password" required class="w-full bg-zinc-950/90 border border-zinc-700/60 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-[#dfb76c] to-[#b8934b] text-black font-black text-xs uppercase tracking-widest py-2.5 rounded shadow-lg hover:brightness-110 transition-all duration-200 active:scale-[0.97] mt-1">
                        Secure Access Login
                    </button>
                </form>
                <div id="auth-error" class="hidden mt-2 text-[10px] uppercase tracking-wider text-red-400 font-bold text-center"></div>
            </div>

        </div>
    </div>

    <script>
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('tacnet-search-app');

        const account = new Appwrite.Account(client);

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('officer-email').value;
            const password = document.getElementById('officer-password').value;
            const errorDiv = document.getElementById('auth-error');
            
            errorDiv.classList.add('hidden');

            try {
                await account.createEmailPasswordSession(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.innerText = `Access Denied: ${error.message}`;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
