<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - Multi-Agency Task Force Search App</title>
    <!-- Tailwind CSS for Rugged Interface Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Appwrite Web SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        .gold-text {
            color: #dfb76c;
        }
        .gold-border {
            border-color: #dfb76c;
        }
        .rugged-title {
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 0.05em;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9);
        }

        /* Continuous slow rotation to simulate a live satellite tracking view */
        @keyframes satelliteOrbit {
            0% {
                transform: scale(1.15) rotate(0deg);
            }
            50% {
                transform: scale(1.20) rotate(2deg);
            }
            100% {
                transform: scale(1.15) rotate(0deg);
            }
        }

        .moving-space-bg {
            animation: satelliteOrbit 45s ease-in-out infinite;
            transform-origin: center center;
        }
    </style>
</head>
<body class="bg-[#02040a] text-white font-sans min-h-screen flex flex-col justify-between relative overflow-hidden">

    <!-- The Big Moving Earth & Satellite Backdrop Container -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-cover bg-center opacity-60 mix-blend-lighten moving-space-bg" 
             style="background-image: url('IMAGE FOR TAC.png2.jpg');">
        </div>
    </div>

    <!-- Interface Wrapper (Adds a deep night-vision vignette over the moving background) -->
    <div class="relative z-10 flex flex-col justify-between items-center w-full min-h-screen px-4 py-8 text-center bg-gradient-to-b from-black/30 via-transparent to-[#02040a]/95">
        
        <!-- Header Section -->
        <header class="w-full max-w-4xl mt-4">
            <!-- Appwrite Connection Status Indicator -->
            <div id="connection-status" class="inline-flex items-center gap-2 bg-black/80 px-4 py-1.5 rounded-full border border-emerald-500/40 text-xs text-emerald-400 tracking-widest uppercase shadow-lg">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Appwrite Connected
            </div>
        </header>

        <!-- Main Identity & Authentication Hub -->
        <main class="w-full max-w-4xl flex flex-col items-center my-auto">
            <h1 class="text-7xl md:text-9xl font-bold uppercase tracking-wider text-gray-300 rugged-title drop-shadow-2xl">
                TACNET
            </h1>
            
            <h2 class="text-xl md:text-3xl font-semibold uppercase tracking-widest text-gray-400 mt-2">
                Multi-Agency-Task-Force-Search-App
            </h2>

            <p class="text-sm md:text-lg uppercase tracking-wide text-gray-200 mt-6 font-medium max-w-2xl px-2">
                USA's First Multi-Agency App Built By Law Enforcement For Law Enforcement
            </p>

            <!-- Multi-Officer Credential Portal -->
            <div id="login-portal" class="mt-8 bg-black/85 border border-zinc-800 p-6 rounded-lg w-full max-w-md shadow-2xl backdrop-blur-md">
                <form id="auth-form" class="space-y-4 text-left">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-1 font-semibold">Agency Email</label>
                        <input type="email" id="officer-email" required class="w-full bg-zinc-900/90 border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="officer@agency.gov">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-1 font-semibold">Secure PIN / Password</label>
                        <input type="password" id="officer-password" required class="w-full bg-zinc-900/90 border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-[#dfb76c] transition-colors" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-[#dfb76c] to-[#b8934b] text-black font-bold uppercase tracking-widest py-3 rounded shadow-lg hover:brightness-110 transition-all duration-200 active:scale-[0.98] mt-2">
                        Secure Access Login
                    </button>
                </form>
                <div id="auth-error" class="hidden mt-3 text-xs uppercase tracking-wider text-red-400 font-semibold text-center"></div>
            </div>
        </main>

        <!-- Footer Section -->
        <footer class="w-full max-w-2xl mb-4 flex flex-col items-center">
            <div class="flex items-center w-full my-3">
                <div class="flex-grow border-t gold-border opacity-40"></div>
                <span class="px-4 text-xs tracking-widest gold-text uppercase font-semibold">App Creator</span>
                <div class="flex-grow border-t gold-border opacity-40"></div>
            </div>

            <h3 class="text-3xl md:text-4xl font-bold tracking-wide gold-text uppercase">
                Earl Wood
            </h3>

            <p class="text-xs md:text-sm tracking-widest text-gray-400 uppercase mt-1 font-semibold">
                Deputy Sheriff Retired Virginia
            </p>
        </footer>
    </div>

    <!-- Core Appwrite Logic Script Integration -->
    <script>
        // Complete Backend Initialization
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('tacnet-search-app');

        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);

        // Authentication Submission Handler
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('officer-email').value;
            const password = document.getElementById('officer-password').value;
            const errorDiv = document.getElementById('auth-error');
            
            errorDiv.classList.add('hidden');

            try {
                // Creates session securely inside Appwrite Cloud
                await account.createEmailPasswordSession(email, password);
                
                // On success, redirect to the main multi-agency tracking dashboard
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.innerText = `Access Denied: ${error.message}`;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
