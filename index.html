<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET</title>
    <!-- Leaflet Map CSS for tactical mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Rugged, military-grade dark hunter green and high-contrast theme */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1d12; /* Dark Hunter Green */
            font-family: 'Courier New', Courier, monospace;
            color: #00ff66; /* Neon Green LED look */
            overflow: hidden;
        }

        /* Full screen tactical map backdrop */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: #001122; /* Royal Blue tactical backdrop hint */
        }

        /* Rugged, cracked gold lettering header */
        .tactical-header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 28px;
            font-weight: bold;
            color: #d4af37; /* Gold */
            text-shadow: 2px 2px 4px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            pointer-events: none;
        }

        /* Secure Login Overlay panel */
        #login-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 29, 18, 0.95); /* Solid Dark Green Shield */
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background-color: #07140c;
            border: 2px solid #d4af37; /* Gold Border */
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: #112217;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-family: monospace;
            box-sizing: border-box;
        }

        .tactical-btn {
            background-color: #d4af37;
            color: #07140c;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 4px 0 #997a15;
        }

        .tactical-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #ff3333; /* Red for errors, changes to green on success */
        }
    </style>
</head>
<body>

    <!-- Tactical Header -->
    <div class="tactical-header">TACNET SYSTEM ACTIVE</div>

    <!-- Secure Authorization Shield -->
    <div id="login-panel">
        <div class="login-box">
            <h2>CREDENTIAL VERIFICATION</h2>
            <div class="input-group">
                <label>Duty Email / Unit ID</label>
                <input type="email" id="officer-email" placeholder="unit@tacnet.com" required>
            </div>
            <div class="input-group">
                <label>Security Access Code</label>
                <input type="password" id="officer-pass" placeholder="••••••••" required>
            </div>
            <button class="tactical-btn" onclick="verifyOfficerLogon()">Authorize Access</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <!-- Active Grid Map Layout -->
    <div id="map"></div>

    <!-- Core Systems Frameworks via Secure CDN Links -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>

    <script>
        // Initialize Appwrite Client Core connected straight to New York
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://nyc.cloud.appwrite.io/v1') 
            .setProject('66731ba3000b9a897df8'); // Your real USA Project ID from your New York server

        const account = new Appwrite.Account(client);
        let tacticalMap;
        let activeMarkers = {};

        // Verify login credentials against your 1-6 cloud database roster
        async function verifyOfficerLogon() {
            const email = document.getElementById('officer-email').value;
            const pass = document.getElementById('officer-pass').value;
            const status = document.getElementById('status-msg');

            status.style.color = '#00ff66';
            status.innerText = "TRANSMITTING TO NY SERVER...";

            try {
                // Attempt secure cloud session verification
                await account.createEmailPasswordSession(email, pass);
                
                status.innerText = "ACCESS GRANTED. INITIALIZING GRID...";
                setTimeout(() => {
                    document.getElementById('login-panel').style.display = 'none';
                    initializeTacticalMap(email);
                }, 1000);

            } catch (error) {
                status.style.color = '#ff3333';
                status.innerText = "AUTH FAILURE: " + error.message;
            }
        }

        // Spin up the map grid once user clearance is authorized
        function initializeTacticalMap(officerEmail) {
            // Default center point roughly over Virginia region
            tacticalMap = L.map('map').setView([37.5, -79.0], 13);

            // Dark, tactical map design layer
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: 'TACNET SECURE GRID'
            }).addTo(tacticalMap);

            // Start hardware GPS tracking chip loop
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;

                        // Center map on this commander's device location
                        tacticalMap.setView([lat, lng]);

                        // Clean or update marker pin for this unit
                        if (activeMarkers[officerEmail]) {
                            activeMarkers[officerEmail].setLatLng([lat, lng]);
                        } else {
                            activeMarkers[officerEmail] = L.marker([lat, lng]).addTo(tacticalMap)
                                .bindPopup(`<b>${officerEmail.split('@')[0].toUpperCase()} (YOU)</b>`)
                                .openPopup();
                        }
                    },
                    (err) => console.error("GPS Signal Lost: ", err),
                    { enableHighAccuracy: true }
                );
            } else {
                alert("Tactical Error: GPS Hardware undetected or disabled on this device.");
            }
        }
    </script>
</body>
</html>
