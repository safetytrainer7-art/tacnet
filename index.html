
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TACNET Landing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  html, body {
    height: 100vh;
    margin: 0; 
    padding: 0;
    font-family: 'Bebas Neue', cursive, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000; /* fallback */
    overflow: hidden;
  }

  /* Container with background image and red border in portrait ratio */
  .image-container {
    position: relative;
    width: 90vw;
    max-width: 420px; /* typical portrait phone width */
    aspect-ratio: 9 / 16; /* portrait ratio */
    background: url('IMAGE FOR TAC.png') no-repeat center center;
    background-size: contain;
    border: 3px solid #FF3131;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131,
      inset 0 0 15px #FF3131;
    border-radius: 6px;
  }

  /* Arrow button attached bottom-right of container */
  .arrow-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 50px;
    height: 50px;
    background: rgba(9, 26, 70, 0.85);
    border: 3px solid #FF3131;
    border-radius: 10px 0 0 0;
    box-shadow:
      0 0 15px #FF3131,
      0 0 30px #FF3131;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.3s;
    z-index: 10;
  }

  .arrow-btn:hover {
    background: rgba(12, 38, 105, 1);
  }

  .arrow-icon {
    border: solid #e4c963;
    border-width: 0 4px 4px 0;
    display: inline-block;
    padding: 10px;
    transform: rotate(45deg); /* arrow pointing down-right */
    -webkit-transform: rotate(45deg);
  }

  /* Responsive adjustments */
  @media (max-width: 600px) {
    .image-container {
      width: 95vw;
      max-width: none;
      aspect-ratio: 9 / 16;
    }
    .arrow-btn {
      width: 40px;
      height: 40px;
    }
    .arrow-icon {
      padding: 8px;
    }
  }
</style>
</head>
<body>

  <div class="image-container">
    <button class="arrow-btn" aria-label="Proceed" onclick="location.href='signin.html'">
      <i class="arrow-icon"></i>
    </button>
  </div>

</body>
</html>
