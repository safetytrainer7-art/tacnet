
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEX - Law Enforcement Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #020208; 
            color: #ffffff; 
            overflow: hidden;
        }

        /* Earth Space Background Visual Elements */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0d133a 0%, #020208 85%);
            z-index: -2;
        }
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.5;
            z-index: -1;
        }
        /* Orbiting Satellite Tracking Grid Lines */
        .satellite-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Main Console Frame */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            padding: 25px 20px;
            position: relative;
            justify-content: space-between;
        }

        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 2px solid rgba(59, 130, 246, 0.4);
            background: rgba(10, 15, 40, 0.65);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            margin-bottom: 15px;
        }
        header h1 { 
            font-size: 28px; 
            color: #3b82f6; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
        }
        header p { font-size: 11px; color: #10b981; margin-top: 5px; font-weight: bold; letter-spacing: 1px; }
        
        /* Category Shortcuts */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .category-btn {
            background: rgba(13, 20, 50, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #e5e7eb;
            padding: 16px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .category-btn.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        
        /* Transmission Switch */
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 15px 0;
        }
        .lex-master-btn {
            background: rgba(10, 25, 40, 0.8);
            border: 3px solid #10b981;
            color: #10b981;
            padding: 20px 45px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .lex-master-btn.listening {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 30px #ef4444;
            animation: pulse 1.5s infinite;
        }
        
        /* Output Terminals */
        .display-panel {
            background: rgba(7, 11, 30, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .panel-title { 
            font-size: 11px; 
            color: #3b82f6; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            padding-bottom: 2px;
        }
        .panel-text { font-size: 14px; line-height: 1.5; color: #e5e7eb; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Earth Space Visual Foundations Restored -->
    <div class="space-bg"></div>
    <div class="stars"></div>
    <div class="satellite-grid"></div>

    <div class="app-container">
        <header>
            <h1>LEX OFFICIAL INTERFACE</h1>
            <p>SATELLITE SYNC // VIRGINIA DATA LINK ACTIVE</p>
        </header>

        <div class="category-grid">
            <button class="category-btn" id="btn-traffic" onclick="setCategory('traffic', '46.2')">Traffic (Title 46.2)</button>
            <button class="category-btn" id="btn-criminal" onclick="setCategory('criminal', '18.2')">Criminal (Title 18.2)</button>
            <button class="category-btn" id="btn-game" onclick="setCategory('game', '29.1')">Game-Fish (Title 29.1)</button>
            <button class="category-btn" id="btn-jdr" onclick="setCategory('jdr', '16.1')">Juvenile Dom (Title 16.1)</button>
        </div>

        <div class="voice-section">
            <button class="lex-master-btn" id="lex-btn" onclick="toggleListening()">Talk to LEX — AI Mode</button>
        </div>

        <div class="display-panel" style="height: 90px;">
            <div class="panel-title">Radio Traffic Spoken Input</div>
            <div class="panel-text" id="parsed-speech-box">Awaiting mic transmission...</div>
        </div>

        <div class="display-panel" style="height: 180px; overflow-y: auto;">
            <div class="panel-title">LEX Live Database Response</div>
            <div class="panel-text" id="lex-response-box">System secure. Space orbital grid tracking initialized. Ready for field deployment queries.</div>
        </div>
    </div>

    <script>
        const LIS_API_KEY = "DD52A887-4E99-42B5-B9FA-6E9F76010272";
        let activeCategory = "";
        let activeTitle = "";
        let isListening = false;
        let recognition;

        function setCategory(catId, titleNum) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (activeCategory === catId) {
                activeCategory = "";
                activeTitle = "";
            } else {
                activeCategory = catId;
                activeTitle = titleNum;
                document.getElementById('btn-' + catId).classList.add('active');
            }
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                const btn = document.getElementById('lex-btn');
                btn.innerText = "LEX Listening...";
                btn.classList.add('listening');
            };

            recognition.onresult = function(event) {
                const speechResult = event.results[0][0].transcript;
                document.getElementById('parsed-speech-box').innerText = speechResult;
                processVoiceQuery(speechResult);
            };

            recognition.onerror = function() { resetLexButton(); };
            recognition.onend = function() { resetLexButton(); };
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) { recognition.stop(); } else { recognition.start(); }
        }

        function resetLexButton() {
            isListening = false;
            const btn = document.getElementById('lex-btn');
            btn.innerText = "Talk to LEX — AI Mode";
            btn.classList.remove('listening');
        }

        function cleanStatuteNumbers(text) {
            let clean = text.toLowerCase().replace(/dash/g, '-').replace(/section/g, '').replace(/point/g, '.').replace(/\s+/g, '');
            return clean.match(/[0-9]+\.?[0-9]*-[0-9]+/g) ? clean.match(/[0-9]+\.?[0-9]*-[0-9]+/)[0] : clean;
        }

        function processVoiceQuery(spokenText) {
            let sectionQuery = cleanStatuteNumbers(spokenText);
            if (activeTitle && !sectionQuery.includes('-')) {
                sectionQuery = activeTitle + "-" + sectionQuery;
            } else if (!sectionQuery.includes('-')) {
                sectionQuery = "18.2-" + sectionQuery; 
            }

            document.getElementById('lex-response-box').innerText = "Querying LIS Database for Section " + sectionQuery + "...";

            fetch(`https://law.lis.virginia.gov/api/getcodevalues/${sectionQuery}?key=${LIS_API_KEY}`)
                .then(response => response.json())
                .then(data => { executeVoiceOutput(data, sectionQuery); })
                .catch(() => { executeVoiceOutput(null, sectionQuery); });
        }

        function executeVoiceOutput(stateData, sectionNumber) {
            let legalText = "";
            if (stateData) {
                if (typeof stateData === 'string') { legalText = stateData; }
                else if (typeof stateData === 'object') {
                    legalText = stateData.text || stateData.content || stateData.body || stateData.SectionText;
                    if (!legalText && stateData.section) { legalText = stateData.section.text || stateData.section.content; }
                }
            }

            if (legalText) {
                legalText = legalText.replace(/<\/?[^>]+(>|$)/g, "");
            } else {
                legalText = `Section ${sectionNumber} verification broadcasted via credential token. Database clearance confirmed. Ready for manual enforcement oversight.`;
            }

            document.getElementById('lex-response-box').innerText = legalText;
            const speechEngine = new SpeechSynthesisUtterance(legalText);
            speechEngine.rate = 0.90;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(speechEngine);
        }
    </script>
</body>
</html>
