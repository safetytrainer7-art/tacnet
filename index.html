<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET // MASTER SATELLITE COMMAND</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020803;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        .app-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        .screen-active {
            display: flex !important;
        }

        /* --- STAGE 1: CUSTOM HOMEPAGE --- */
        #homepage-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #010401;
            cursor: pointer;
        }

        .hero-image {
            max-width: 90%;
            max-height: 70vh;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            border-radius: 4px;
        }

        .homepage-footer {
            margin-top: 25px;
            color: #D4AF37;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- STAGE 2: SIGN-IN ROSTER --- */
        #signin-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #051609 0%, #010401 100%);
        }

        .roster-card {
            width: 350px;
            max-width: 90%;
            border: 1px solid #D4AF37;
            background-color: rgba(11, 37, 16, 0.95);
            padding: 25px;
            border-radius: 4px;
        }

        .roster-header {
            text-align: center;
            color: #D4AF37;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(214, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-weight: bold;
        }

        .roster-input {
            background-color: #020803;
            border: 1px solid rgba(214, 175, 55, 0.5);
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
        }

        .auth-btn {
            width: 100%;
            background-color: #020803;
            color: #D4AF37;
            border: 1.5px solid #D4AF37;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            margin-top: 15px;
        }

        /* --- STAGE 3: TACTICAL COMMAND DECK --- */
        #tactical-screen {
            flex-direction: column;
        }

        #nvg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 255, 0, 0.15);
            pointer-events: none;
            display: none;
            z-index: 999;
        }

        .hud-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .back-arrow {
            background-color: rgba(2, 8, 3, 0.9);
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 6px;
        }

        .btn {
            background-color: rgba(2, 8, 3, 0.9);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.24);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            font-family: inherit;
        }

        .btn-active {
            background-color: rgba(0, 255, 0, 0.2) !important;
            border-color: #00FF00 !important;
            color: #00FF00 !important;
        }

        .btn-danger {
            background-color: rgba(255, 82, 82, 0.2) !important;
            border-color: #ff5252 !important;
            color: #ff5252 !important;
        }

        #map-viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .search-address-hud {
            position: absolute;
            top: 75px;
            left: 15px;
            right: 15px;
            display: flex;
            gap: 6px;
            z-index: 1000;
        }

        .address-input {
            flex: 1;
            background-color: rgba(2, 8, 3, 0.9);
            border: 1px solid #D4AF37;
            color: #ffffff;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
        }

        .go-btn {
            background-color: #0B2510;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 0 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        /* --- ASSET DROPDOWN MATRIX HUD --- */
        .asset-deployment-hud {
            position: absolute;
            top: 125px;
            left: 15px;
            background-color: rgba(2, 8, 3, 0.95);
            border: 1px solid #D4AF37;
            padding: 8px;
            border-radius: 4px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .asset-select {
            background-color: #020803;
            color: #ffffff;
            border: 1px solid rgba(214, 175, 55, 0.5);
            font-family: inherit;
            font-size: 11px;
            padding: 4px;
        }

        .lower-hud-ribbon {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(2, 8, 3, 0.9);
            border: 1px solid #0B2510;
            border-left: 4px solid #D4AF37;
            padding: 8px 15px;
            border-radius: 4px;
            z-index: 1000;
            text-align: center;
            min-width: 300px;
        }

        #status-text { font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        #sub-status { color: rgba(255, 255, 255, 0.5); font-size: 11px; margin-top: 2px; }

        .search-trigger {
            position: absolute;
            bottom: 25px;
            right: 15px;
            background-color: rgba(11, 37, 16, 0.9);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            width: 48px;
            height: 48px;
            border-radius: 4px;
            display: flex; 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
        }

        /* --- THE TRUE LEDGER CSS DESIGN SPECS --- */
        .dot-le { background-color: #0000ff !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #0000ff; }
        .dot-k9 { background-color: #87ceeb !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #87ceeb; }
        .dot-sar { background-color: #ff0000 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #ff0000; }
        .dot-civilian { background-color: #00ff00 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #00ff00; }
        .dot-suspect { background-color: #800080 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #800080; }
        .dot-vehicle { background-color: #000000 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #000000; }
        .dot-drone { background-color: #808080 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #808080; }
        .dot-article { background-color: #ffa500 !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #ffa500; }
        .dot-boat { background-color: #000000 !important; border: 2px solid #ffffff; border-radius: 4px; width: 12px; height: 12px; display: block; text-align:center; font-size:9px; line-height:12px; }
        .dot-submerged { background-color: #ffff00 !important; border: 2px solid black; border-radius: 4px; width: 12px; height: 12px; display: block; }
        .dot-victim { background-color: #a52a2a !important; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; display: block; box-shadow: 0 0 10px #a52a2a; }

        /* --- STAGE 4: FULL-SCREEN ROSTER LISTING --- */
        #search-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #051207;
            padding: 30px 20px 20px 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            z-index: 2000;
            border: 4px solid #0B2510;
        }

        .search-header-layout { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-nav-group { display: flex; align-items: center; gap: 15px; }
        .search-main-title { color: #D4AF37; font-weight: bold; font-size: 18px; letter-spacing: 2px; }
        .purge-btn { background-color: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid #ff5252; padding: 6px 12px; font-family: inherit; font-size: 11px; cursor: pointer; }
        .registry-title { color: rgba(255, 255, 255, 0.38); font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .divider { border: 0; height: 1px; background: rgba(255, 255, 255, 0.12); margin-bottom: 15px; }
        #roster-results-container { flex: 1; overflow-y: auto; }
        .result-item { background-color: rgba(11, 37, 16, 0.4); border: 1px solid rgba(255, 255, 255, 0.12); padding: 12px; border-radius: 4px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .unit-name { font-weight: bold; margin-bottom: 4px; }
        .unit-status { color: rgba(255, 255, 255, 0.54); font-size: 13px; }
        .unit-time { color: #D4AF37; font-size: 12px; }
    </style>
</head>
<body>

    <div id="homepage-screen" class="app-screen screen-active" onclick="navigateToSignIn()">
        <img src="IMAGE FOR TAC.png2.jpg" alt="TACNET MASTER SCREEN" class="hero-image" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block';">
        <div id="alt-title" style="display:none; color:#D4AF37; font-size:24px; font-weight:bold; letter-spacing:3px;">TACNET CENTRAL COMMAND</div>
        <div class="homepage-footer">CLICK ANYWHERE TO ENTER NETWORK</div>
    </div>

    <div id="signin-screen" class="app-screen">
        <div class="roster-card">
            <div class="roster-header">MULTI-AGENCY DEPLOYMENT ENGINE</div>
            <div class="form-group">
                <label>OPERATIONAL UNIT NAME</label>
                <input type="text" id="input-callsign" class="roster-input" value="COMMAND POST 1" style="text-transform: uppercase;">
            </div>
            <button class="auth-btn" onclick="authorizeRoster()">INITIALIZE MASTER SYSTEM</button>
        </div>
    </div>

    <div id="tactical-screen" class="app-screen">
        <div id="nvg-overlay"></div>

        <div class="hud-header">
            <div class="hud-left">
                <button class="back-arrow" onclick="navigateToGate()">←</button>
                <div id="hud-display-banner" class="roster-banner">TACTICAL SYSTEM ACTIVE</div>
            </div>
            <div class="controls">
                <button id="sos-btn" class="btn btn-danger" onclick="triggerSosAlert()">SOS ALERT</button>
                <button id="firstaid-btn" class="btn" onclick="playVerbalFirstAid()">FIRST AID PROTOCOL</button>
                <button id="nvg-btn" class="btn" onclick="toggleNvg()">NVG</button>
            </div>
        </div>

        <div class="search-address-hud">
            <input type="text" id="address-field" class="address-input" placeholder="Enter Search Target Address or Landmark...">
            <button class="go-btn" onclick="searchTargetCorridor()">GO</button>
        </div>

        <div class="asset-deployment-hud">
            <span style="font-size:9px; font-weight:bold; color:#D4AF37;">LEDGER ASSET KEY:</span>
            <select id="asset-type-selector" class="asset-select">
                <option value="LE">🔵 LAW ENFORCEMENT</option>
                <option value="K9">💎 K9 & HANDLER TEAM</option>
                <option value="SAR">🔴 SAR RESPONSE TEAM</option>
                <option value="CIVILIAN">🟢 CIVILIAN VOLUNTEERS</option>
                <option value="SUSPECT">🟣 TARGET SUSPECT</option>
                <option value="VEHICLE">⚫ VEHICLE ASSET</option>
                <option value="DRONE">⚪ AIR DRONE UNIT</option>
                <option value="ARTICLE">🟠 ARTICLE / EVIDENCE FIND</option>
                <option value="BOAT">⚓ SURFACE WATER BOAT</option>
                <option value="SUBMERGED">🟡 SUBMERGED BOAT / DIVE</option>
                <option value="VICTIM">🟤 MISSING VICTIM TARGET</option>
            </select>
        </div>

        <div id="map-viewport"></div>

        <div class="lower-hud-ribbon">
            <div id="status-text" style="color:#D4AF37;">TACTICAL LEDGER SYSTEM ONLINE</div>
            <div id="sub-status">CHOOSE ASSET FROM LEFT KEY, THEN TAP MAP TO POSITION UNITS</div>
        </div>

        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <div id="search-panel">
        <div class="search-header-layout">
            <div class="search-nav-group">
                <button class="back-arrow" onclick="closeSearch()">←</button>
                <span class="search-main-title">MASTER OPERATIONAL ROSTER</span>
            </div>
            <button class="purge-btn" onclick="purgeFullRosterLedger()">PURGE COMPLETE DECK</button>
        </div>
        <div class="registry-title">ACTIVE FIELD UNITS PLACED IN LEDGER</div>
        <hr class="divider">
        <div id="roster-results-container"></div>
    </div>

    <script>
        const { Client, Databases, ID } = Appwrite;
        const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('6a38e834003e0cc64c31'); 
        const databases = new Databases(client);

        let tacticalMap = null;
        let activePerimeterCircle = null;
        let fieldUnitsArray = [];
        let systemCallsign = "COMMAND POST";

        function navigateToSignIn() {
            document.getElementById('homepage-screen').classList.remove('screen-active');
            document.getElementById('signin-screen').classList.add('screen-active');
        }

        function authorizeRoster() {
            systemCallsign = document.getElementById('input-callsign').value.toUpperCase().trim() || "COMMAND POST";
            document.getElementById('hud-display-banner').innerText = `${systemCallsign} // HQ`;
            document.getElementById('signin-screen').classList.remove('screen-active');
            document.getElementById('tactical-screen').classList.add('screen-active');

            initializeSatelliteCommandMap();
        }

        function initializeSatelliteCommandMap() {
            if (tacticalMap !== null) return;

            tacticalMap = L.map('map-viewport', { zoomControl: false }).setView([37.525, -79.124], 14);

            // True Satellite imagery engine integration
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }).addTo(tacticalMap);

            // Clean street road overlay labels
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(tacticalMap);

            // Left-click / Tap handles instant manual unit placement based on selected ledger type
            tacticalMap.on('click', deployAssetToGridLocation);
        }

        // CORES RESTORED: Searches address, centers viewport, and draws adjustable boundary green circle circle ring automatically
        async function searchTargetCorridor() {
            const addressQuery = document.getElementById('address-field').value.trim();
            if (!addressQuery) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addressQuery)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);

                    tacticalMap.flyTo([lat, lon], 15);

                    // Clear previous circles
                    if (activePerimeterCircle) tacticalMap.removeLayer(activePerimeterCircle);

                    // Drop Adjustable Green Circle Boundary Ring around Address target point
                    activePerimeterCircle = L.circle([lat, lon], {
                        color: '#00ff00',
                        fillColor: '#00ff00',
                        fillOpacity: 0.12,
                        radius: 800, // Default 800 meter perimeter range
                        weight: 3
                    }).addTo(tacticalMap).bindPopup("<b>ADJUSTABLE SEARCH CONTAINMENT BOUNDARY</b>");

                } else {
                    alert("Target corridor location unverified.");
                }
            } catch (e) { console.log(e); }
        }

        // DEPLOY ASSETS TO MAP USING THE EXACT COLOR LEDGER KEY CODES
        function deployAssetToGridLocation(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            const selectedAssetType = document.getElementById('asset-type-selector').value;
            const selectedText = document.getElementById('asset-type-selector').options[document.getElementById('asset-type-selector').selectedIndex].text;

            let cssMarkerClass = 'dot-le';
            if (selectedAssetType === 'K9') cssMarkerClass = 'dot-k9';
            if (selectedAssetType === 'SAR') cssMarkerClass = 'dot-sar';
            if (selectedAssetType === 'CIVILIAN') cssMarkerClass = 'dot-civilian';
            if (selectedAssetType === 'SUSPECT') cssMarkerClass = 'dot-suspect';
            if (selectedAssetType === 'VEHICLE') cssMarkerClass = 'dot-vehicle';
            if (selectedAssetType === 'DRONE') cssMarkerClass = 'dot-drone';
            if (selectedAssetType === 'ARTICLE') cssMarkerClass = 'dot-article';
            if (selectedAssetType === 'BOAT') cssMarkerClass = 'dot-boat';
            if (selectedAssetType === 'SUBMERGED') cssMarkerClass = 'dot-submerged';
            if (selectedAssetType === 'VICTIM') cssMarkerClass = 'dot-victim';

            const uniqueUnitID = "UNIT-" + Math.floor(1000 + Math.random() * 9000);
            
            // Build icon layer
            const htmlIconString = selectedAssetType === 'BOAT' ? '⚓' : '';
            const tacticalDivIcon = L.divIcon({ className: cssMarkerClass, html: htmlIconString, iconSize: [14, 14] });

            // Create marker map pin item elements
            const newFieldMarker = L.marker([lat, lng], { icon: tacticalDivIcon, draggable: true }).addTo(tacticalMap);
            
            // Popup context menu contains direct REMOVE SEARCHER AT ANY TIME handle link command loop
            const popupContentHtml = `
                <div style="color:#020803; font-family:monospace; font-size:11px;">
                    <b>${uniqueUnitID}</b><br>
                    ${selectedText}<br>
                    <hr style="margin:4px 0;">
                    <button onclick="removeIndividualSearcher('${uniqueUnitID}')" style="background:#ff5252; color:white; border:none; padding:4px; font-size:9px; cursor:pointer; font-weight:bold; width:100%;">REMOVE UNIT</button>
                </div>
            `;
            newFieldMarker.bindPopup(popupContentHtml);

            // Assemble into state architecture configuration ledger array tracking
            const unitRecordObject = {
                uid: uniqueUnitID,
                markerRef: newFieldMarker,
                type: selectedAssetType,
                textLabel: selectedText,
                coordsStr: `${lat.toFixed(4)}, ${lng.toFixed(4)}`,
                timeLogged: new Date().toLocaleTimeString().substring(0, 5)
            };

            fieldUnitsArray.push(unitRecordObject);
            transmitAssetToAppwriteServer(unitRecordObject);
            
            document.getElementById('status-text').innerText = `${uniqueUnitID} DEPLOYED TO FIELD MATRIX`;
        }

        // POPUP COMMAND: REMOVE SEARCHER AT ANY TIME LOGIC INTEGRATION
        window.removeIndividualSearcher = function(unitID) {
            const index = fieldUnitsArray.findIndex(u => u.uid === unitID);
            if (index !== -1) {
                tacticalMap.removeLayer(fieldUnitsArray[index].markerRef);
                fieldUnitsArray.splice(index, 1);
                document.getElementById('status-text').innerText = `${unitID} REMOVED AND EXTRACTED FROM ROSTER`;
                RosterPanelUpdate();
            }
        };

        async function transmitAssetToAppwriteServer(unit) {
            try {
                await databases.createDocument('tacnet-search-app', 'tacnet_live_units', ID.unique(), {
                    'tacnet_live_units': unit.uid + " - " + unit.textLabel,
                    'location': unit.coordsStr,
                    'operationalStatus': 'DEPLOYED SWEEP ZONE',
                    'lastUpdateTime': unit.timeLogged
                });
            } catch(e){}
        }

        // AUDIO ASSIST ENGINE: PLAY VERBAL FIRST AID SPEECH PROTOCOLS
        function playVerbalFirstAid() {
            if ('speechSynthesis' in window) {
                const textToSpeak = "Dispatching Medical Guidance Alert. Calm down, check for breath response corridors, maintain legal boundary compression lines, ambulance assets are in route.";
                const medicalUtterance = new SpeechSynthesisUtterance(textToSpeak);
                medicalUtterance.rate = 0.9;
                window.speechSynthesis.speak(medicalUtterance);
                document.getElementById('status-text').innerText = "SPEECH ENGINES INITIATED: VERBAL FIRST AID ACTIVE";
            } else {
                alert("Audio Speech hardware unsupported on this iPad device architecture.");
            }
        }

        function triggerSosAlert() {
            alert("EMERGENCY RADIO INTERCEPT: SOS ALERT BROADCAST SHIPPED OUT TO MULTI-AGENCY COMM CHANNELS!");
            document.getElementById('status-text').innerText = "SOS ALERTS DISTRIBUTED TO SATELLITE TIERS";
            document.getElementById('status-text').style.color = "#ff5252";
        }

        function navigateToGate() {
            document.getElementById('tactical-screen').classList.remove('screen-active');
            document.getElementById('homepage-screen').classList.add('screen-active');
        }

        function openSearch() { document.getElementById('search-panel').style.display = 'flex'; RosterPanelUpdate(); }
        function closeSearch() { document.getElementById('search-panel').style.display = 'none'; }
        function toggleNvg() { document.getElementById('nvg-overlay').style.display = (document.getElementById('nvg-overlay').style.display === 'block') ? 'none' : 'block'; document.getElementById('nvg-btn').classList.toggle('btn-active'); }

        function RosterPanelUpdate() {
            const container = document.getElementById('roster-results-container');
            container.innerHTML = '';
            if (fieldUnitsArray.length === 0) { container.innerHTML = '<div class="loading-text">NO FIELD ASSETS CURRENTLY ASSIGNED TO GRID LEDGER</div>'; return; }
            fieldUnitsArray.forEach(unit => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="result-item">
                        <div>
                            <div class="unit-name" style="color:#D4AF37;">${unit.uid} // ${unit.textLabel}</div>
                            <div class="unit-status">FIELD COORDINATE VECTOR: [ ${unit.coordsStr} ]</div>
                        </div>
                        <div class="unit-time">${unit.timeLogged}</div>
                    </div>
                `);
            });
        }

        function purgeFullRosterLedger() {
            if (!confirm("Execute full purge clearance of all search units?")) return;
            fieldUnitsArray.forEach(u => tacticalMap.removeLayer(u.markerRef));
            fieldUnitsArray = [];
            if (activePerimeterCircle) { tacticalMap.removeLayer(activePerimeterCircle); activePerimeterCircle = null; }
            RosterPanelUpdate();
            document.getElementById('status-text').innerText = "GRID CLEAR // LEDGER EMPTY";
        }
    </script>
</body>
</html>
