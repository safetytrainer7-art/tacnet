<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET - Tactical Command Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tactical-dark { background-color: #050b14; }
        .panel-glass {
            background: rgba(10, 20, 32, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        /* Locks your exact uploaded image perfectly to the screen background */
        .tacnet-graphic-bg {
            background-image: url('./tac-bg.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000000;
        }
        .app-perimeter-frame {
            border: 4px solid #ffffff !important;
        }
    </style>
</head>
<body class="tactical-dark h-screen text-white font-sans flex flex-col justify-between overflow-hidden app-perimeter-frame">

    <!-- EMERGENCY BANNER -->
    <div id="emergency-banner" class="hidden bg-red-700 border-b-2 border-red-500 text-center p-2 animate-pulse z-50 relative">
        <h2 class="text-xs font-black tracking-widest"><i class="fa-solid fa-triangle-exclamation mr-1.5"></i> EMERGENCY BROADCAST SIGNAL ACTIVE <i class="fa-solid fa-triangle-exclamation ml-1.5"></i></h2>
        <button onclick="cancelEmergencySignal()" class="mt-1 bg-slate-950 border border-white/40 text-white text-[9px] font-black uppercase px-2 py-0.5 rounded">Reset</button>
    </div>

    <!-- UPPER CONTROL CONSOLE -->
    <header class="panel-glass p-3 flex flex-col space-y-2 z-40 relative shadow-2xl">
        <div class="flex justify-between items-center border-b border-slate-800 pb-1.5">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-crosshairs text-emerald-400 animate-pulse"></i>
                <h2 class="font-black text-xs tracking-wider uppercase text-slate-200">TACNET MISSION INTERFACE</h2>
            </div>
            <a href="./index.html" class="bg-slate-900 border border-slate-700 text-slate-300 font-bold text-[9px] px-2.5 py-1 rounded tracking-wider uppercase">
                <i class="fa-solid fa-arrow-left text-blue-400 mr-1"></i> LEX HOME
            </a>
        </div>

        <!-- TARGET SEARCH COMPONENT -->
        <div class="flex flex-col space-y-1">
            <label class="text-[9px] font-black tracking-widest text-blue-400 uppercase">LOG TARGET AREA / OPERATION LOCATION</label>
            <div class="flex items-center space-x-1.5">
                <input id="search-address" type="text" placeholder="Enter perimeter staging address..." class="w-full bg-slate-950 border border-slate-700 px-3 py-1.5 rounded text-xs font-semibold focus:outline-none focus:border-blue-500 text-white">
                <button onclick="logAddressPerimeter()" class="bg-blue-600 hover:bg-blue-500 font-black text-xs px-3 py-1.5 rounded tracking-widest uppercase">LOG</button>
            </div>
        </div>

        <!-- TASK FORCE INPUT TOKENS -->
        <div class="grid grid-cols-2 gap-2 pt-0.5">
            <div>
                <input id="op-token" type="text" placeholder="Operation Token (e.g. OP410)" class="w-full bg-slate-950 border border-slate-800 px-2 py-1 rounded text-[10px] uppercase font-bold text-center text-blue-400 placeholder-blue-900 focus:outline-none">
            </div>
            <button onclick="initializeMeshTracking()" class="w-full bg-emerald-700 hover:bg-emerald-600 font-black text-[10px] py-1 rounded tracking-widest uppercase shadow-md">Sync Grid Channels</button>
        </div>
    </header>

    <!-- CORE DISPLAY FIELD RUNNING YOUR EXACT IMAGE -->
    <main class="w-full flex-grow relative tacnet-graphic-bg border-y border-slate-900">
        
        <!-- FLUID DISPLAY CONTROLS PLACED OVER BACKGROUND GRAPHIC -->
        <div class="absolute top-2 left-2 z-30 panel-glass p-2 rounded-md w-[110px] text-xs shadow-xl opacity-90">
            <h4 class="font-black border-b border-white/20 pb-0.5 mb-1 text-[8px] text-blue-400 uppercase tracking-wider">Asset Layers</h4>
            <div class="space-y-0.5 font-bold text-[9px] text-slate-300">
                <div class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-blue-600"></span> <span>LE Units</span></div>
                <div class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-cyan-400"></span> <span>K9 Teams</span></div>
                <div class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-red-600"></span> <span>SAR Teams</span></div>
                <div class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-purple-600"></span> <span>Suspect</span></div>
                <div class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-yellow-400"></span> <span>Articles</span></div>
            </div>
        </div>

        <!-- LIVE INTERACTIVE DIGITAL STATUS TICKER -->
        <div id="status-readout" class="absolute bottom-2 left-1/2 -translate-x-1/2 z-30 bg-slate-950/90 border border-emerald-500/30 rounded px-3 py-1 font-mono text-[9px] text-emerald-400 text-center tracking-wide w-[85%] shadow-2xl">
            📡 MESH SYSTEM SECURE // MONITORING FOOTPRINT CHANNELS...
        </div>
    </main>

    <!-- REPORT GENERATION RECAP VIEW -->
    <div id="report-preview-pane" class="hidden w-full max-w-sm mx-auto my-2 panel-glass rounded-xl p-3 overflow-y-auto max-h-[140px] shadow-2xl z-40 relative">
        <div class="flex justify-between items-center mb-1 border-b border-white/20 pb-1">
            <h3 class="text-amber-400 font-black tracking-wide uppercase text-[9px]">📋 Post-Incident Court Evidence Log</h3>
            <button onclick="printGeneratedReport()" class="bg-emerald-600 hover:bg-emerald-500 px-2 py-0.5 rounded text-[8px] font-black uppercase">Print</button>
        </div>
        <div id="dossier-html-target" class="bg-white rounded p-2 text-black text-[9px]"></div>
    </div>

    <!-- COMMAND CONTROLS FOOTER PANEL -->
    <footer class="bg-slate-950 p-3 flex flex-col space-y-2 z-40 relative shadow-[0_-4px_15px_rgba(0,0,0,0.6)]">
        <div class="grid grid-cols-2 gap-3">
            <button onclick="triggerEmergencySignal()" class="bg-red-700 hover:bg-red-600 font-black tracking-widest uppercase text-xs py-2.5 rounded-lg flex items-center justify-center space-x-1.5 animate-pulse border border-red-500">
                <i class="fa-solid fa-hand-fist"></i> <span>OFFICER DISTRESS</span>
            </button>
            <button onclick="terminateSearchSequence()" class="bg-amber-600 hover:bg-amber-500 font-black tracking-widest uppercase text-xs py-2.5 rounded-lg flex items-center justify-center space-x-1.5 border border-amber-500">
                <i class="fa-solid fa-CLOSE SEARCH LOG"></i> <span>CLOSE SEARCH LOG</span>
            </button>
        </div>
    </footer>

    <!-- INTERFACE DRIVER SCRIPTS -->
    <script>
        let reportRecorder = null;
        let alarmInterval = null;

        window.addEventListener('DOMContentLoaded', () => {
            reportRecorder = new CourtReportGenerator("OP-2026-AMHERST", "Deputy Earl Wood (Ret.)");
            reportRecorder.logSearchEvent("SYSTEM", "TACNET Graphic Frame Layer Engaged.");
        });

        // WIRED: Logs address to ticker, saves to court dossier, and fires native mapping launcher
        function logAddressPerimeter() {
            const addr = document.getElementById('search-address').value.trim();
            if (!addr) return;
            
            // 1. Update live ticker display text
            document.getElementById('status-readout').innerText = `📍 PERIMETER SITE BOUND: ${addr.toUpperCase()}`;
            
            // 2. Log event entry directly into court timeline tracker
            if(reportRecorder) reportRecorder.logSearchEvent("COMMAND", `Staging Area Perimeter Verified Location: ${addr}`);
            
            // 3. Fire the native iOS map protocol redirect link instantly
            setTimeout(() => {
                const nativeMapUrl = `maps://?q=${encodeURIComponent(addr)}`;
                window.location.href = nativeMapUrl;
            }, 800);
        }

        // WIRED: Logs operations token to green digital ticker and registers timeline accountability
        function initializeMeshTracking() {
            const token = document.getElementById('op-token').value.trim().toUpperCase();
            if(!token) return;
            
            document.getElementById('status-readout').innerText = `🔒 SYSTEM STREAM SECURE VIA OPERATIONS MESH SEC-TOKEN: [${token}]`;
            if(reportRecorder) reportRecorder.logSearchEvent("MESH", `Channel encryption handshakes verified under token signature: ${token}`);
        }

        class CourtReportGenerator {
            constructor(operationId, supervisor) {
                this.operationId = operationId;
                this.supervisor = supervisor;
                this.timelineEvents = [];
            }
            logSearchEvent(assetName, detail) {
                this.timelineEvents.push({
                    timestamp: new Date().toTimeString().split(' ')[0],
                    unit: assetName,
                    description: detail
                });
            }
            compileFinalDossier() {
                let htmlDossier = `
                    <div style='font-family:Arial,sans-serif;padding:10px;color:#111;background-color:#ffffff;'>
                        <h4 style='margin:0;color:#1e3a8a;font-weight:900;'>TACNET COMPREHENSIVE COURT DOSSIER</h4>
                        <p style='margin:2px 0;font-size:10px;color:#475569;'><b>Operational Control Log // Case File Accountability Timeline</b></p>
                        <hr style='border:1px solid #cbd5e1;margin:6px 0;'>
                `;
                this.timelineEvents.forEach(ev => {
                    htmlDossier += `<p style='margin:4px 0;font-size:10px;line-height:1.3;'><b>[${ev.timestamp}] [${ev.unit}]:</b> ${ev.description}</p>`;
                });
                htmlDossier += `</div>`;
                return htmlDossier;
            }
        }

        function triggerEmergencyAudioSignature() {
            if (!alarmInterval) {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                alarmInterval = setInterval(() => {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 0.4);
                    gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.4);
                }, 500);
            }
        }

        function triggerEmergencySignal() {
            document.getElementById('emergency-banner').classList.remove('hidden');
            document.getElementById('status-readout').innerText = "🚨 ALERT: CRITICAL OFFICER DISTRESS TRANSMISSION EMITTED!";
            if(reportRecorder) reportRecorder.logSearchEvent("ALERT", "DISTRESS FREQUENCY BROADCAST CHANNELS DEPLOYED.");
            triggerEmergencyAudioSignature();
        }

        function cancelEmergencySignal() {
            document.getElementById('emergency-banner').classList.add('hidden');
            document.getElementById('status-readout').innerText = "📡 MESH SYSTEM SECURE // MONITORING FOOTPRINT CHANNELS...";
            if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
        }

        function terminateSearchSequence() {
            if(reportRecorder) {
                document.getElementById('status-readout').innerText = "🔒 SYSTEM LOG TERMINATED AND DIGITALLY SIGNED.";
                document.getElementById('dossier-html-target').innerHTML = reportRecorder.compileFinalDossier();
                document.getElementById('report-preview-pane').classList.remove('hidden');
            }
            if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function printGeneratedReport() {
            const docContent = document.getElementById('dossier-html-target').innerHTML;
            const w = window.open('', '_blank');
            w.document.write(`<html><head><title>TACNET Log</title></head><body style='background:#fff;'>${docContent}</body></html>`); 
            w.document.close(); 
            setTimeout(() => { w.print(); }, 250);
        }
    </script>
</body>
</html>
