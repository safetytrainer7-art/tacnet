<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET | Ops Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: grid; grid-template-columns: 300px 1fr; height: 100vh; background: #0a1a2f; color: #fff; font-family: sans-serif; }
        #map { height: 100vh; position: relative; }
        .controls { background: #1a4d2e; padding: 20px; border-right: 3px solid #d4b04a; }
        .emergency-btn { background: #ff0000; color: white; padding: 20px; width: 100%; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tool-btn { background: #d4b04a; color: #0a1a2f; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">
        <button class="emergency-btn" onclick="triggerAlert()">OFFICER EMERGENCY</button>
        <input type="text" placeholder="Address Search..." style="width: 100%; padding: 10px;">
        <button class="tool-btn" style="width:100%; margin-top:5px;">GO</button>
        <hr>
        <div class="tools">
            <button class="tool-btn">PEN TOOL</button>
            <button class="tool-btn">LOCK MAP</button>
            <button class="tool-btn">RECORD</button>
            <button class="tool-btn">REPORT</button>
        </div>
        <button onclick="terminateMission()" style="background:#444; color:white; width:100%; margin-top:20px;">TERMINATE SEARCH</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([37.5, -79.2], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function triggerAlert() { alert("!!! EMERGENCY BROADCAST SENT !!!"); }
        function terminateMission() { 
            if(confirm("TERMINATE ALL OPERATIONS?")) { window.location.href = 'index.html'; } 
        }
    </script>
</body>
</html>
