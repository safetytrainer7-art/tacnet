<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { margin:0; display:grid; grid-template-columns: 300px 1fr; height:100vh; font-family:sans-serif; background:#0a1a2f; }
        #map { height:100vh; }
        .sidebar { background:#1a4d2e; color:#fff; padding:15px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>PERSONNEL</h3>
        <div id="ledger"></div>
        <button onclick="window.location.href='index.html'" style="margin-top:20px; width:100%;">TERMINATE</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script>
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const map = L.map('map', {layers:[sat]}).setView([37.5, -79.2], 12);
        
        // Red Pen Tool
        const drawItems = new L.FeatureGroup();
        map.addLayer(drawItems);
        new L.Control.Draw({
            draw: { polyline: {shapeOptions:{color:'red', weight:5}}, polygon:false, rectangle:false, circle:false, marker:false },
            edit: { featureGroup: drawItems }
        }).addTo(map);
        map.on('draw:created', e => drawItems.addLayer(e.layer));

        const units = [{n:"Supervisor",c:"#FFF"},{n:"K9",c:"#87CEFA"},{n:"LE",c:"#00F"},{n:"SAR",c:"#F00"},{n:"Civ",c:"#0F0"},{n:"Suspect",c:"#800"},{n:"Vehicle",c:"#000"},{n:"Article",c:"#F80"},{n:"CMD",c:"#FF0"},{n:"Drone",c:"#888"}];
        units.forEach(u => {
            document.getElementById('ledger').innerHTML += `<div style="padding:5px; border-bottom:1px solid #d4b04a;">${u.n} <button onclick="setMode('${u.n}','${u.c}')">PLACE</button></div>`;
        });

        let mode = null;
        function setMode(n, c) { mode = {n, c}; }
        map.on('click', e => {
            if(mode) {
                const m = L.circleMarker(e.latlng, {fillColor:mode.c, fillOpacity:1, color:'#fff', radius:8}).addTo(map);
                m.on('contextmenu', () => map.removeLayer(m)); // Right-click to remove
                mode = null;
            }
        });
    </script>
</body>
</html>
