<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET | MISSION CONTROL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        :root { --navy: #0a1a2f; --green: #1a4d2e; --gold: #d4b04a; }
        body { margin: 0; display: grid; grid-template-columns: 320px 1fr; height: 100vh; background: var(--navy); color: #fff; font-family: sans-serif; }
        .sidebar { background: var(--green); padding: 20px; border-right: 3px solid var(--gold); }
        #map { height: 100vh; cursor: crosshair; }
        .btn-tac { background: var(--gold); color: var(--navy); border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--gold)">MISSION CONTROL</h2>
        <input type="text" id="addr" placeholder="Enter Address..." style="width:100%; padding:8px;">
        <button class="btn-tac" onclick="findLocation()">GO TO LOCATION</button>
        <hr>
        <div id="ledger"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script>
        const map = L.map('map').setView([37.5, -79.2], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Drawing Layer (Red Pen)
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        new L.Control.Draw({ draw: { polyline: { shapeOptions: { color: '#ff0000', weight: 5 } }, polygon: false, rectangle: false, circle: false, marker: false }, edit: { featureGroup: drawnItems } }).addTo(map);
        map.on('draw:created', (e) => drawnItems.addLayer(e.layer));

        // Manual Placement Logic
        let pendingUnit = null;
        function deploy(name, color) {
            alert("Click anywhere on the map to place " + name);
            map.once('click', (e) => {
                const marker = L.circleMarker(e.latlng, {color: '#fff', fillColor: color, fillOpacity: 1, radius: 10}).addTo(map).bindPopup(name + "<br><button onclick='this.parentElement.parentElement.remove()'>REMOVE</button>");
            });
        }

        const units = [{name:"Supervisor",color:"#FFF"},{name:"K9 Team",color:"#87CEFA"},{name:"Law Enforcement",color:"#00F"},{name:"SARs",color:"#F00"},{name:"Civilian",color:"#0F0"},{name:"Suspect",color:"#800080"},{name:"Suspect Vehicle",color:"#000"},{name:"Article Find",color:"#F80"},{name:"Command Post",color:"#FF0"},{name:"Drone",color:"#888"}];
        units.forEach(u => {
            document.getElementById('ledger').innerHTML += `<div style="padding:5px; border-bottom:1px solid #d4b04a;">
                <span style="background:${u.color}; width:12px; height:12px; display:inline-block;"></span> ${u.name} 
                <button onclick="deploy('${u.name}', '${u.color}')" style="float:right;">PLACE</button></div>`;
        });

        function findLocation() {
            const lat = 37.54, lng = -79.18; // Simulated coordinates for demo
            map.setView([lat, lng], 15);
            L.circle([lat, lng], { color: '#39ff7a', fillColor: '#39ff7a', radius: 150 }).addTo(map);
        }
    </script>
</body>
</html>
