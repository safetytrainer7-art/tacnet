<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Officer Sign-In - TACNET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  html, body {
    margin: 0; padding: 0;
    height: 100vh;
    font-family: 'Bebas Neue', cursive, sans-serif;
    background: url('IMAGE FOR TAC.png') no-repeat center center fixed;
    background-size: contain;
    overflow: hidden;
    color: #d9b94e;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: 10px; bottom: 10px;
    left: 10px; right: 10px;
    pointer-events: none;
    border: 3px solid #FF3131;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131,
      inset 0 0 15px #FF3131;
    border-radius: 6px;
    z-index: 9999;
  }
  .signin-container {
    background: rgba(9, 26, 70, 0.85);
    padding: 2rem;
    border-radius: 10px;
    box-shadow:
      0 0 15px #FF3131,
      0 0 25px #FF3131;
    text-align: center;
    width: 90vw;
    max-width: 400px;
  }
  h1 {
    margin-bottom: 1.5rem;
    font-size: 2.5rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: bold;
    letter-spacing: 0.1em;
  }
  input {
    width: 100%;
    padding: 0.8rem;
    margin-bottom: 1.2rem;
    border: 2px solid #FF3131;
    border-radius: 6px;
    background: #121c3a;
    color: #e4c963;
    font-size: 1rem;
  }
  input:focus {
    outline: none;
    border-color: #ffe066;
    box-shadow: 0 0 8px #ffe066;
  }
  button {
    padding: 1rem 2rem;
    font-size: 1.2rem;
    background: #FF3131;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: background 0.3s ease;
  }
  button:hover {
    background: #e63232;
  }
  .links {
    margin-top: 1.5rem;
    display: flex;
    justify-content: space-around;
  }
  .links a {
    color: #ffe066;
    text-decoration: none;
    font-weight: bold;
  }
  .links a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="signin-container" role="main" aria-label="Officer Sign In Form">
    <h1>Officer Sign In</h1>
    <form>
      <label for="badgeNumber">Badge Number</label>
      <input type="text" id="badgeNumber" name="badgeNumber" required />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />
      <button type="submit">Sign In</button>
    </form>
    <div class="links">
      <a href="agency_signin.html" aria-label="Agency Sign In">Agency Sign In</a>
      <a href="token_access.html" aria-label="Token Access">Token Access</a>
    </div>
  </div>
</body>
</html>
